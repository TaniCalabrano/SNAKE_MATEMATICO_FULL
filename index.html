<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Serpientes Funcion v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;}
body{background:#080816;font-family:'Courier New',monospace;color:#e0e0ff;display:flex;flex-direction:column;align-items:center;touch-action:none;}
#game-wrap{display:flex;flex-direction:column;align-items:center;width:100%;padding:4px;}

/* HUD */
#hud{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;padding:4px 6px;background:#0e0e24;border:1px solid #2a2a50;border-radius:8px;margin-bottom:4px;width:100%;max-width:680px;}
.hud-block{display:flex;flex-direction:column;align-items:center;min-width:44px;}
.hud-label{font-size:8px;color:#6677aa;letter-spacing:1px;text-transform:uppercase;}
.hud-val{font-size:12px;font-weight:bold;color:#c8d8ff;}
.hud-val.hp{color:#4eff88;}.hud-val.dmg{color:#ff6644;}.hud-val.lvl{color:#ffcc44;}.hud-val.phase{color:#cc88ff;font-size:10px;}
.bar-wrap{width:40px;height:5px;background:#1a1a30;border-radius:3px;margin-top:2px;}
.bar-inner{height:100%;border-radius:3px;transition:width 0.3s;}.bar-hp{background:#4eff88;}

/* Enemy HUD */
#enemy-hud{background:#140a1e;border:1px solid #3a2a50;border-radius:8px;padding:3px 10px;text-align:center;margin-bottom:3px;min-height:36px;width:100%;max-width:680px;}
#enemy-name{font-size:11px;color:#ffaa44;font-weight:bold;letter-spacing:1px;}
#enemy-fx{font-size:10px;color:#cc88ff;font-style:italic;margin-top:1px;}
#enemy-hp-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:2px;}
#enemy-hp-bar-wrap{width:140px;height:6px;background:#1a0e1e;border-radius:4px;}
#enemy-hp-bar{height:100%;background:#ff4466;border-radius:4px;transition:width 0.3s;}
#enemy-hp-txt{font-size:9px;color:#ff8899;}

/* Canvas */
canvas{border:1px solid #2a2a44;border-radius:4px;cursor:none;display:block;}
#canvas-wrap{position:relative;width:100%;max-width:680px;}

/* Canvas scales responsively — internal resolution stays fixed */
#c, #deathCanvas{
  width:100% !important;
  height:auto !important;
  touch-action:none;
}

/* Overlay */
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,4,16,0.94);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;border-radius:4px;z-index:10;padding:10px 12px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#overlay h2{font-size:16px;color:#ffcc44;margin-bottom:4px;text-align:center;}
#overlay .sub{font-size:11px;color:#aabbdd;text-align:center;max-width:420px;line-height:1.5;margin-bottom:5px;}
.math-card{background:#0c0c22;border:1px solid #334466;border-radius:8px;padding:8px 12px;margin:4px 0;max-width:440px;width:100%;text-align:left;}
.math-card h3{font-size:11px;color:#88ccff;margin-bottom:3px;}
.math-card .fx-big{font-size:14px;color:#ffee66;font-weight:bold;text-align:center;margin:3px 0 6px;}
.math-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.badge-btn{font-size:10px;padding:4px 8px;border-radius:3px;font-weight:bold;cursor:pointer;border:none;transition:filter 0.15s;font-family:'Courier New',monospace;min-height:30px;}
.badge-btn:hover,.badge-btn:active{filter:brightness(1.4);}
.badge-btn.yes{background:#143a14;color:#66ff88;border:1px solid #2a6a2a;}
.badge-btn.no{background:#3a1414;color:#ff8866;border:1px solid #6a2a2a;}
.badge-btn.neutral{background:#1a1a3a;color:#88aaff;border:1px solid #334;}
.proof-panel{display:none;background:#07071a;border:1px solid #3355aa;border-radius:6px;margin:3px 0 5px;overflow:hidden;}
.proof-panel.open{display:block;}
.proof-canvas{display:block;width:100%!important;border-radius:4px 4px 0 0;}
.tog-btn{background:#0e1a3a;color:#88aaff;border:1px solid #2a4488;border-radius:0 0 4px 4px;font-family:'Courier New',monospace;font-size:9px;padding:4px 8px;cursor:pointer;width:100%;text-align:left;display:block;min-height:28px;}
.alg-panel{display:none;padding:8px 10px;background:#050510;border-top:1px solid #1a2a44;font-size:10px;line-height:1.8;font-family:'Courier New',monospace;}
.math-def{font-size:10px;color:#9aadcc;line-height:1.5;margin-bottom:3px;}
.math-def strong{color:#ccddff;}
.mini-graph-wrap{text-align:center;margin:5px 0;}
.mini-graph-wrap canvas{border:1px solid #334;border-radius:4px;display:inline-block;}
#overlay .main-btn{background:#1a3366;color:#cce;border:1px solid #336;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px;font-family:'Courier New',monospace;min-height:44px;touch-action:manipulation;}
#overlay .main-btn:active{background:#2244aa;}
#overlay .phase-banner{font-size:13px;color:#cc88ff;font-weight:bold;text-align:center;margin:5px 0;border:1px solid #664488;background:#1a0a2a;padding:6px 14px;border-radius:6px;max-width:440px;width:100%;}

/* Pause overlay */
#pause-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,4,16,0.9);flex-direction:column;align-items:center;justify-content:center;border-radius:4px;z-index:11;padding:20px;}

/* Desktop ctrl bar — hidden on mobile */
.ctrl-bar{display:flex;gap:6px;margin-top:4px;justify-content:center;flex-wrap:wrap;}
.ctrl-btn{background:#101028;color:#aaccff;border:1px solid #2a2a44;padding:5px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;min-height:32px;touch-action:manipulation;}
.ctrl-btn:hover,.ctrl-btn:active{background:#1e1e44;}
#controls-hint{font-size:9px;color:#3a4488;text-align:center;margin-top:3px;}

/* ── MOBILE D-PAD ─────────────────────────────────────────────────────── */
#mobile-controls{
  display:none;
  position:absolute;
  bottom:8px; left:0; right:0;
  pointer-events:none;
  z-index:20;
}
#dpad{
  position:absolute;
  bottom:8px; left:10px;
  width:130px; height:130px;
  pointer-events:all;
}
.dpad-btn{
  position:absolute;
  width:42px; height:42px;
  background:rgba(100,120,200,0.25);
  border:2px solid rgba(100,140,255,0.5);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px; color:rgba(150,180,255,0.9);
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.08s;
}
.dpad-btn:active, .dpad-btn.pressed{background:rgba(100,120,200,0.55);}
#dpad-up   {top:0;   left:44px;}
#dpad-down {bottom:0;left:44px;}
#dpad-left {top:44px;left:0;}
#dpad-right{top:44px;left:88px;}
#dpad-center{top:44px;left:44px;border-radius:50%;font-size:11px;color:rgba(150,180,255,0.5);}

#shoot-btn{
  position:absolute;
  bottom:20px; right:16px;
  width:70px; height:70px;
  background:rgba(100,255,150,0.2);
  border:2px solid rgba(100,255,150,0.5);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent;
  pointer-events:all;
  transition:background 0.08s;
}
#shoot-btn:active{background:rgba(100,255,150,0.5);}

#pause-btn-mobile{
  position:absolute;
  top:6px; right:6px;
  width:36px; height:36px;
  background:rgba(40,40,80,0.7);
  border:1px solid #2a2a66;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  cursor:pointer; user-select:none;
  pointer-events:all;
  -webkit-tap-highlight-color:transparent;
}

/* Show d-pad only on touch devices */
@media (hover:none) and (pointer:coarse){
  #mobile-controls{display:block;}
  #controls-hint{display:none;}
  canvas{cursor:default;}
  /* Make ctrl-bar buttons bigger */
  .ctrl-btn{min-height:38px;padding:6px 12px;}
}

/* Responsive font scaling */
@media (max-width:400px){
  .hud-val{font-size:10px;}
  .hud-label{font-size:7px;}
  #enemy-name{font-size:10px;}
}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="hud">
    <div class="hud-block"><span class="hud-label">Nivel</span><span class="hud-val lvl" id="h-lvl">1</span></div>
    <div class="hud-block" style="min-width:70px;"><span class="hud-label">Fase</span><span class="hud-val phase" id="h-phase">Funciones</span></div>
    <div class="hud-block"><span class="hud-label">Vidas</span><span class="hud-val hp" id="h-hp">100</span><div class="bar-wrap"><div class="bar-inner bar-hp" id="bar-hp" style="width:100%"></div></div></div>
    <div class="hud-block"><span class="hud-label">Ataque</span><span class="hud-val dmg" id="h-dmg">20</span></div>
    <div class="hud-block"><span class="hud-label">Veneno</span><span class="hud-val" id="h-bullets">5</span><div class="bar-wrap"><div class="bar-inner" id="bar-reload" style="width:0%;background:#ffcc44"></div></div></div>
    <div class="hud-block"><span class="hud-label">Score</span><span class="hud-val" id="h-score">0</span></div>
    <div class="hud-block"><span class="hud-label">Kills</span><span class="hud-val" id="h-kills">0</span></div>
  </div>
  <div id="enemy-hud">
    <div id="enemy-name">-</div><div id="enemy-fx">-</div>
    <div id="enemy-hp-row"><div id="enemy-hp-bar-wrap"><div id="enemy-hp-bar" style="width:100%"></div></div><span id="enemy-hp-txt">-</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <canvas id="deathCanvas"></canvas>

    <!-- Mobile controls overlay (inside canvas-wrap so it scales with it) -->
    <div id="mobile-controls">
      <div id="dpad">
        <div class="dpad-btn" id="dpad-up"    data-dir="up">▲</div>
        <div class="dpad-btn" id="dpad-left"  data-dir="left">◀</div>
        <div class="dpad-btn" id="dpad-center"></div>
        <div class="dpad-btn" id="dpad-right" data-dir="right">▶</div>
        <div class="dpad-btn" id="dpad-down"  data-dir="down">▼</div>
      </div>
      <div id="shoot-btn">💊</div>
      <div id="pause-btn-mobile">⏸</div>
    </div>

    <div id="pause-overlay">
      <h2 style="font-size:18px;color:#ffcc44;margin-bottom:12px;font-family:'Courier New',monospace;">PAUSADO</h2>
      <div style="display:flex;flex-direction:column;gap:10px;width:200px;">
        <button onclick="togglePause()" class="ctrl-btn" style="padding:12px;font-size:13px;">Continuar</button>
        <button onclick="confirmRestart()" class="ctrl-btn" style="padding:12px;color:#ffaacc;">Reiniciar nivel</button>
        <button onclick="goToMenu()" class="ctrl-btn" style="padding:12px;color:#aaffdd;">Menu principal</button>
      </div>
    </div>
    <div id="overlay">
      <h2 id="ov-title">Serpientes Funcion</h2>
      <p class="sub" id="ov-desc">Derrota serpientes-funcion para aprender matematicas.</p>
      <div id="ov-phase-banner" class="phase-banner" style="display:none"></div>
      <div id="ov-math" style="display:none;width:100%;max-width:440px;"></div>
      <button class="main-btn" id="ov-btn">Comenzar</button>
    </div>
  </div>
  <div class="ctrl-bar">
    <button class="ctrl-btn" id="btn-pause" onclick="togglePause()">Pausar (P)</button>
    <button class="ctrl-btn" onclick="confirmRestart()">Reiniciar</button>
    <button class="ctrl-btn" onclick="goToMenu()">Menu</button>
    <button class="ctrl-btn" onclick="showBooks()" style="color:#ffcc44;">Libros</button>
  </div>
  <div id="controls-hint">Flechas / WASD: mover | Espacio: disparar | P: pausar</div>
</div>
<script>

// CANVAS SETUP
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var dCanvas = document.getElementById('deathCanvas');
var dCtx = dCanvas.getContext('2d');
var CELL=16, COLS=42, ROWS=38;
var W=COLS*CELL, H=ROWS*CELL;
canvas.width=W; canvas.height=H;
// CSS scaling: width:100% set by stylesheet, height follows aspect ratio
dCanvas.width=W; dCanvas.height=H;
var MID_X=Math.floor(COLS/2), MID_Y=Math.floor(ROWS/2);
var ORIG_X=MID_X*CELL, ORIG_Y=MID_Y*CELL;

// ── MOBILE INPUT ──────────────────────────────────────────────────────────
// D-pad buttons
(function setupMobile(){
  var dirs={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
  ['up','down','left','right'].forEach(function(d){
    var btn=document.getElementById('dpad-'+d);
    if(!btn)return;
    function press(ev){
      ev.preventDefault();
      if(typeof player==='undefined'||gameState!=='playing')return;
      var dir=dirs[d];
      // prevent 180° reversal
      if(dir.x!==0&&player.dir.x===-dir.x)return;
      if(dir.y!==0&&player.dir.y===-dir.y)return;
      player.nextDir={x:dir.x,y:dir.y};
      btn.classList.add('pressed');
    }
    function release(ev){ev.preventDefault();btn.classList.remove('pressed');}
    btn.addEventListener('touchstart',press,{passive:false});
    btn.addEventListener('touchend',release,{passive:false});
    btn.addEventListener('mousedown',press);
    btn.addEventListener('mouseup',release);
  });

  // Shoot button
  var shootBt=document.getElementById('shoot-btn');
  if(shootBt){
    shootBt.addEventListener('touchstart',function(ev){
      ev.preventDefault();
      if(gameState==='playing')shootPlayer();
    },{passive:false});
    shootBt.addEventListener('mousedown',function(){
      if(gameState==='playing')shootPlayer();
    });
  }

  // Mobile pause button
  var pauseBt=document.getElementById('pause-btn-mobile');
  if(pauseBt){
    pauseBt.addEventListener('touchstart',function(ev){
      ev.preventDefault(); togglePause();
    },{passive:false});
  }

  // Swipe on canvas (alternative to d-pad)
  var swipeStart={x:0,y:0};
  var SWIPE_MIN=20; // px threshold
  canvas.addEventListener('touchstart',function(ev){
    if(ev.touches.length===1){
      swipeStart.x=ev.touches[0].clientX;
      swipeStart.y=ev.touches[0].clientY;
    }
  },{passive:true});
  canvas.addEventListener('touchend',function(ev){
    if(gameState!=='playing')return;
    var dx=ev.changedTouches[0].clientX-swipeStart.x;
    var dy=ev.changedTouches[0].clientY-swipeStart.y;
    if(Math.abs(dx)<SWIPE_MIN&&Math.abs(dy)<SWIPE_MIN){
      // tap = shoot
      shootPlayer(); return;
    }
    var horizontal=Math.abs(dx)>Math.abs(dy);
    if(horizontal){
      var nd=dx>0?{x:1,y:0}:{x:-1,y:0};
      if(nd.x!==-player.dir.x)player.nextDir=nd;
    } else {
      var nd2=dy>0?{x:0,y:1}:{x:0,y:-1};
      if(nd2.y!==-player.dir.y)player.nextDir=nd2;
    }
  },{passive:true});

  // Prevent default touch scroll on canvas to avoid page bouncing during play
  canvas.addEventListener('touchmove',function(ev){
    if(gameState==='playing')ev.preventDefault();
  },{passive:false});
})();

// PROOF SYSTEM
var _pc=0;
var _af={};

function uid(){ return 'p'+(++_pc); }

function badgeBtn(cls, label, key, pid){
  return '<button class="badge-btn '+cls+'" data-pid="'+pid+'" data-key="'+key+'">'+label+' [?]</button>'+
         '<div class="proof-panel" id="'+pid+'"></div>';
}

document.addEventListener('click', function(ev){
  var el = ev.target;
  if(el.getAttribute && el.getAttribute('data-pid')){
    toggleProof(el.getAttribute('data-pid'), el.getAttribute('data-key'));
    return;
  }
  if(el.getAttribute && el.getAttribute('data-togpid')){
    var pid2=el.getAttribute('data-togpid');
    if(window['spm_'+pid2]) window['spm_'+pid2]();
  }
});

function toggleProof(pid, key){
  var el=document.getElementById(pid);
  if(!el) return;
  var card=el.closest('.math-card');
  var enemy=card?card._enemy:null;
  if(card) card.querySelectorAll('.proof-panel').forEach(function(p){
    if(p!==el){ p.classList.remove('open'); if(_af[p.id]){cancelAnimationFrame(_af[p.id]);delete _af[p.id];} }
  });
  var wasOpen=el.classList.contains('open');
  el.classList.toggle('open');
  if(_af[pid]){cancelAnimationFrame(_af[pid]);delete _af[pid];}
  if(!wasOpen && enemy) renderProof(el, pid, key, enemy);
}

function buildMathCard(e){
  var d=e.mathDef;
  var p1=uid(),p2=uid(),p3=uid(),p4=uid(),p5=uid(),p6=uid();
  var html='<div class="math-card" data-eid="'+e.id+'">';
  html+='<h3>'+e.name+'</h3>';
  html+='<div class="fx-big">'+e.fx+'</div>';
  html+='<div class="math-row">';
  html+=badgeBtn('neutral','Dom: '+d.dominio,'dominio',p1);
  html+=badgeBtn('neutral','Rec: '+d.recorrido,'recorrido',p2);
  html+=badgeBtn(d.inyectiva?'yes':'no','Inyectiva: '+(d.inyectiva?'Si':'No'),'inyectiva',p3);
  html+=badgeBtn(d.sobreyectiva?'yes':'no','Sobreyect.: '+(d.sobreyectiva?'Si':'No'),'sobreyectiva',p4);
  html+=badgeBtn(d.biyectiva?'yes':'no','Biyectiva: '+(d.biyectiva?'Si':'No'),'biyectiva',p5);
  html+=badgeBtn(d.inversa?'yes':'no','Inversa: '+(d.inversa?'Admite':'No admite'),'inversa',p6);
  html+='</div>';
  html+='<div class="math-def"><strong>Definicion:</strong> '+d.definicion+'</div>';
  html+='<div class="math-def"><strong>Propiedades:</strong> '+d.propiedades+'</div>';
  if(d.inversaDef) html+='<div class="math-def"><strong>Inversa:</strong> '+d.inversaDef+'</div>';
  html+='<div class="math-def" style="color:#aaddbb"><strong>Apps:</strong> '+d.apps+'</div>';
  html+='<div class="mini-graph-wrap"><canvas id="mgc-'+e.id+'" width="200" height="100" style="background:#080814;"></canvas></div>';
  html+='</div>';
  setTimeout(function(){
    var card=document.querySelector('.math-card[data-eid="'+e.id+'"]');
    if(card) card._enemy=e;
  },0);
  return html;
}

function drawMiniGraph(e){
  var mc=document.getElementById('mgc-'+e.id);
  if(!mc) return;
  var mc2=mc.getContext('2d');
  mc2.fillStyle='#080814'; mc2.fillRect(0,0,200,100);
  mc2.strokeStyle='#334466'; mc2.lineWidth=1;
  mc2.beginPath(); mc2.moveTo(100,0); mc2.lineTo(100,100); mc2.stroke();
  mc2.beginPath(); mc2.moveTo(0,50); mc2.lineTo(200,50); mc2.stroke();
  mc2.strokeStyle=e.color; mc2.lineWidth=1.5; mc2.beginPath();
  var started=false;
  for(var px=0;px<200;px++){
    var xVal=(px-100)/20;
    var raw=evalFuncRaw(e.type,e.cfg,xVal);
    if(raw===null||!isFinite(raw)||Math.abs(raw)>12){started=false;continue;}
    var py=50-raw*8;
    if(py<0||py>100){started=false;continue;}
    if(!started){mc2.moveTo(px,py);started=true;}else mc2.lineTo(px,py);
  }
  mc2.stroke();
  mc2.fillStyle=e.color; mc2.font='bold 9px Courier New'; mc2.textAlign='left';
  mc2.fillText(e.fx,4,12);
}

// ALGEBRAIC PROOF DATA
function getAlgProof(key, e){
  var t=e.type, c=e.cfg;
  var tm={dlin:'linear',dquad:'quadratic',dcubic:'cubic',dsqrt:'sqrt',
          drational:'rational',dsin:'sin',dcos:'cos',dexp:'exp',dlog:'log',dtan:'tan'};
  var rt=tm[t]||t;
  var a=c.a||1, b=c.b||0, k=c.k||4, off=c.off||0, p=c.p||4;
  var A=c.A||1, w=c.w||1, base=c.base||2;
  var bname=base===Math.E?'e':''+base;
  var h=c.b?(-c.b/(2*(c.a||1))).toFixed(2):'0';
  var vk=(c.c!==undefined)?(c.c-(c.b||0)*(c.b||0)/(4*(c.a||1))).toFixed(2):'0';

  var db={
    dominio:{
      linear:{label:'Dominio - Lineal/Afin',steps:['f(x)='+a+'x+'+b+' es polinomio grado 1.','Sin denominadores ni radicandos.','-> Definida para todo x real.','Dom(f) = R']},
      quadratic:{label:'Dominio - Cuadratica',steps:['f(x)='+a+'x^2+'+b+'x+'+c.c+' es polinomio.','Sin restricciones en x.','Dom(f) = R']},
      cubic:{label:'Dominio - Cubica',steps:['f(x)=x^3+'+a+'x es polinomio grado 3.','Definida para todo x real.','Dom(f) = R']},
      sqrt:{label:'Dominio - Raiz(x+'+off+')',steps:['Condicion: radicando >= 0','x + '+off+' >= 0','x >= '+(-off),'Dom(f) = ['+(-off)+', +inf)']},
      rational:{label:'Dominio - '+k+'/x',steps:['Restriccion: denominador != 0','x != 0 (division por cero)','Dom(f) = R \\ {0}']},
      sin:{label:'Dominio - A*sin(wx)',steps:['sin(t) definido para todo t real.','No hay restriccion en x.','Dom(f) = R']},
      cos:{label:'Dominio - A*cos(wx)',steps:['cos(t) definido para todo t real.','Dom(f) = R']},
      exp:{label:'Dominio - b^x',steps:['b^x definida para todo x real (b>0).','Dom(f) = R']},
      log:{label:'Dominio - ln(x+'+off+')',steps:['Condicion: argumento > 0','x + '+off+' > 0','x > '+(-off),'Dom(f) = ('+(-off)+', +inf)']},
      tan:{label:'Dominio - tan(x/'+p+')',steps:['tan = sin/cos, restriccion: cos != 0','x/'+p+' != pi/2 + k*pi','x != '+p+'*pi/2 + k*'+p+'*pi','Dom = R \\ {'+p+'*pi/2 + k*'+p+'*pi}']}
    },
    recorrido:{
      linear:{label:'Recorrido - Lineal/Afin',steps:['Sea y en R. Despejamos x:','y = '+a+'x + '+b,'x = (y - '+b+') / '+a+' esta en R.','Para todo y existe x. Rec(f) = R']},
      quadratic:{label:'Recorrido - Parabola (vertice k='+vk+')',steps:['Completar cuadrado: f(x)='+a+'(x-h)^2+'+vk,(a>0?'a>0 -> f(x) >= '+vk:'a<0 -> f(x) <= '+vk),'Rec = '+(a>0?'['+vk+', +inf)':'(-inf, '+vk+']')]},
      cubic:{label:'Recorrido - Cubica',steps:['lim(x->+inf)=+inf, lim(x->-inf)=-inf','f continua (polinomio).','TVI (Bolzano): todo y en R es alcanzado.','Rec(f) = R']},
      sqrt:{label:'Recorrido - Raiz',steps:['raiz(u) >= 0 siempre.','En x='+(-off)+': f=0 (minimo).','Crece sin limite.','Rec(f) = [0, +inf)']},
      rational:{label:'Recorrido - '+k+'/x',steps:['Si y!=0: x='+k+'/y existe.','Si y=0: '+k+'/x=0 => '+k+'=0, imposible.','Rec(f) = R \\ {0}']},
      sin:{label:'Recorrido - '+A+'*sin('+w+'x)',steps:['|sin| <= 1 siempre.','Max: A*1='+A+', Min: A*(-1)='+(-A)+'.','Rec(f) = ['+(-A)+', '+A+']']},
      cos:{label:'Recorrido - '+A+'*cos('+w+'x)',steps:['|cos| <= 1 siempre.','Max en x=0: f(0)='+A+'.','Rec(f) = ['+(-A)+', '+A+']']},
      exp:{label:'Recorrido - '+bname+'^x',steps:[bname+'^x > 0 para todo x.','Para y>0: x=log_'+bname+'(y) satisface.','Para y<=0: sin solucion real.','Rec(f) = (0, +inf)']},
      log:{label:'Recorrido - ln(x+'+off+')',steps:['lim->-inf cuando x->'+(-off)+'+','lim->+inf cuando x->+inf','Para y en R: x=e^y-'+off+' satisface.','Rec(f) = R']},
      tan:{label:'Recorrido - tan(x/'+p+')',steps:['tan tiende a +inf y -inf.','Para y en R: x='+p+'*arctan(y) satisface.','Rec(f) = R']}
    },
    inyectiva:{
      linear:{label:'Inyectividad - Lineal/Afin',steps:['Suponer f(x1)=f(x2):',a+'*x1+'+b+' = '+a+'*x2+'+b,a+'*(x1-x2)=0 -> x1=x2 (a='+a+'!=0)','f es inyectiva']},
      quadratic:{label:'No inyectividad - Parabola',steps:['Eje simetria: x=h='+h,'Tomar x1='+h+'+1, x2='+h+'-1 (distintos).','f(x1)='+a+'*1+'+vk+'=f(x2)','-> misma imagen, distintos x.','f NO es inyectiva']},
      cubic:{label:'Inyectividad - Cubica (a='+a+')',steps:(a===0?['x1^3=x2^3 -> x1=x2 (cubica biyectiva)','f es inyectiva']:['f\'(x)=3x^2+'+a+', tiene extremos locales.','Existen x1!=x2 con f(x1)=f(x2).','f NO es inyectiva'])},
      sqrt:{label:'Inyectividad - Raiz',steps:['Suponer raiz(x1+'+off+')=raiz(x2+'+off+').','Elevar al cuadrado: x1+'+off+'=x2+'+off+'.','x1=x2. f es inyectiva']},
      rational:{label:'Inyectividad - '+k+'/x',steps:['Suponer '+k+'/x1='+k+'/x2.','Multiplicar: '+k+'*x2='+k+'*x1 -> x1=x2.','f es inyectiva']},
      sin:{label:'No inyectividad - Seno',steps:['sin(pi-t)=sin(t) siempre.','f(x)=f(pi/'+w+'-x). Ej: f(0)=f(pi/'+w+')=0.','f NO es inyectiva']},
      cos:{label:'No inyectividad - Coseno',steps:['cos par: cos(-t)=cos(t).','f(x)=f(-x). Ej: f(1)=f(-1).','f NO es inyectiva']},
      exp:{label:'Inyectividad - '+bname+'^x',steps:['Suponer '+bname+'^x1='+bname+'^x2.','Aplicar log_'+bname+': x1=x2.','f es inyectiva']},
      log:{label:'Inyectividad - ln(x+'+off+')',steps:['Suponer ln(x1+'+off+')=ln(x2+'+off+').','Aplicar exp: x1+'+off+'=x2+'+off+'.','x1=x2. f es inyectiva']},
      tan:{label:'Inyectividad - tan(x/'+p+') por rama',steps:["f'(x)=1/("+p+"*cos^2(x/"+p+"))>0 en Dom.",'Creciente estricta en cada rama.','Sup. f(x1)=f(x2) misma rama -> x1=x2.','f es inyectiva en cada rama']}
    },
    sobreyectiva:{
      linear:{label:'Sobreyectividad - Lineal/Afin',steps:['Sea y en R. Resolver '+a+'x+'+b+'=y:','x=(y-'+b+')/'+a+' esta en R.','Para todo y existe x. f es sobreyectiva']},
      quadratic:{label:'No sobreyectividad - Parabola',steps:['Vertice en k='+vk+'.',(a>0?'Para y='+((+vk)-1)+': discriminante<0.':'Para y='+((+vk)+1)+': discriminante<0.'),'Ese y no tiene preimagen.','f NO es sobreyectiva sobre R']},
      cubic:{label:'Sobreyectividad - Cubica',steps:['lim=+inf y -inf, f continua.','TVI garantiza todo y en R es alcanzado.','f es sobreyectiva']},
      sqrt:{label:'No sobreyectividad - Raiz',steps:['raiz(x+'+off+')>=0 siempre.','Para y=-1: sin solucion real.','Rec=[0,+inf) != R. f NO es sobreyectiva']},
      rational:{label:'No sobreyectividad - '+k+'/x',steps:['Intentar '+k+'/x=0 -> '+k+'=0, imposible.','y=0 no tiene preimagen.','f NO es sobreyectiva sobre R']},
      sin:{label:'No sobreyectividad - Seno',steps:['|f(x)|<='+A+' siempre.','Para y='+((A)+1)+': |sin|>1, imposible.','f NO es sobreyectiva sobre R']},
      cos:{label:'No sobreyectividad - Coseno',steps:['|f(x)|<='+A+' siempre.','Rec=['+(-A)+','+A+'] != R.','f NO es sobreyectiva sobre R']},
      exp:{label:'No sobreyectividad - '+bname+'^x',steps:[bname+'^x>0 siempre.','Para y=-1: sin solucion.','f NO es sobreyectiva sobre R']},
      log:{label:'Sobreyectividad - ln(x+'+off+')',steps:['Sea y en R. Tomar x=e^y-'+off+'.','x>'+(-off)+' y f(x)=ln(e^y)=y. Existe.','f es sobreyectiva']},
      tan:{label:'Sobreyectividad - tan(x/'+p+')',steps:['Sea y en R. Tomar x='+p+'*arctan(y).','arctan(y) existe para todo y.','f(x)=tan(arctan(y))=y. f es sobreyectiva']}
    },
    biyectiva:{
      linear:{label:'Biyectividad - Lineal/Afin',steps:['Inyectiva: f(x1)=f(x2)->x1=x2 OK','Sobreyect.: para todo y existe x OK','Iny AND Sobre => Biyectiva','f es biyectiva sobre R']},
      quadratic:{label:'No biyectividad - Parabola',steps:['No inyectiva: f(h+1)=f(h-1), h+1!=h-1','No sobreyect.: Rec!= R','f NO es biyectiva']},
      cubic:{label:'Biyectividad - Cubica',steps:(a===0?['Inyectiva y sobreyectiva (TVI).','f es biyectiva']:['No inyectiva (extremos locales).','f NO es biyectiva'])},
      sqrt:{label:'Biyect. - Raiz',steps:['Inyectiva OK','No sobreyect. sobre R: Rec=[0,+inf)','NO biyectiva sobre R','Si biyectiva como f:Dom->[0,+inf)']},
      rational:{label:'Biyect. - '+k+'/x',steps:['Inyectiva en R\\{0} OK','No sobreyect. sobre R: y=0 no en Rec','NO biyectiva sobre R']},
      sin:{label:'No biyect. - Seno',steps:['No inyectiva: f(x)=f(pi/w-x)','No sobreyect.: acotada','f NO es biyectiva']},
      cos:{label:'No biyect. - Coseno',steps:['No inyectiva: f(x)=f(-x)','No sobreyect.: acotada','f NO es biyectiva']},
      exp:{label:'Biyect. - '+bname+'^x',steps:['Inyectiva OK','No sobreyect. sobre R: Rec=(0,+inf)','Biyectiva como f:R->(0,+inf)','NO biyectiva sobre R']},
      log:{label:'Biyectividad - ln(x+'+off+')',steps:['Inyectiva: ln estrictamente creciente OK','Sobreyect.: todo y en R es alcanzado OK','Iny AND Sobre => Biyectiva']},
      tan:{label:'Biyect. - tan(x/'+p+') por rama',steps:["f'(x)>0 en Dom: creciente estricta OK",'Rec=R (tiende a +/-inf) OK','Biyectiva en cada rama']}
    },
    inversa:{
      linear:{label:'Inversa - '+e.fx,steps:['Partir de: y = '+a+'x + '+b,'Despejar x: '+a+'x = y - '+b,'x = (y - '+b+') / '+a,'f^-1(y) = (y - '+b+') / '+a,'Verificar: f(f^-1(y))='+a+'*(y-'+b+')/'+a+'+'+b+'=y OK']},
      quadratic:{label:'Inversa restringida - Parabola',steps:['f no inyectiva globalmente.','Restringir a x >= h = '+h+':','y = '+a+'*(x-h)^2 + '+vk,'(x-h)^2 = (y-'+vk+')/'+a,'x = '+h+' + raiz((y-'+vk+')/'+a+'), y >= '+vk]},
      cubic:{label:'Inversa - Cubica',steps:(a===0?['Partir de: y = x^3','x = cubraiz(y)','f^-1(y) = y^(1/3)']:['No inyectiva: sin inversa global.','Inversas locales en cada rama.'])},
      sqrt:{label:'Inversa - Raiz(x+'+off+')',steps:['Partir de: y = raiz(x+'+off+'), y>=0','Elevar al cuadrado: y^2 = x+'+off,'x = y^2 - '+off,'f^-1(y) = y^2 - '+off+', y >= 0','Verificar: raiz(y^2-'+off+'+'+off+')=y OK']},
      rational:{label:'Inversa - '+k+'/x',steps:['Partir de: y = '+k+'/x','x*y = '+k,'x = '+k+'/y','f^-1(y) = '+k+'/y','f es su propia inversa! (involucion)']},
      sin:{label:'Inversa restringida - Seno',steps:['sin no inyectiva en R.','Restringir a x en [-pi/(2*'+w+'), pi/(2*'+w+')]','En ese intervalo: creciente estricta.','f^-1(y) = arcsin(y/'+A+') / '+w,'Dom f^-1: [-'+A+', '+A+']']},
      cos:{label:'Inversa restringida - Coseno',steps:['cos no inyectiva en R.','Restringir a x en [0, pi/'+w+']','f^-1(y) = arccos(y/'+A+') / '+w,'Dom f^-1: [-'+A+', '+A+']']},
      exp:{label:'Inversa - '+bname+'^x',steps:['Partir de: y = '+bname+'^x (y>0)','Aplicar log_'+bname+': x = log_'+bname+'(y)','x = ln(y)/ln('+bname+')','f^-1(y) = ln(y)/ln('+bname+')']},
      log:{label:'Inversa - ln(x+'+off+')',steps:['Partir de: y = ln(x+'+off+')','Aplicar exp: e^y = x+'+off,'x = e^y - '+off,'f^-1(y) = e^y - '+off,'Verificar: ln(e^y-'+off+'+'+off+')=y OK']},
      tan:{label:'Inversa - tan(x/'+p+')',steps:['Partir de: y = tan(x/'+p+')','arctan(y) = x/'+p,'x = '+p+'*arctan(y)','f^-1(y) = '+p+'*arctan(y)','Dom: R, Rec: (-'+p+'*pi/2, '+p+'*pi/2)']}
    }
  };
  return (db[key]&&db[key][rt])||null;
}

// PROOF CANVAS RENDERER
function renderProof(panel, pid, key, e){
  var d=e.mathDef;
  var CW=380, CH=(key==='inversa'?360:160);
  var algProof=getAlgProof(key,e);
  panel.innerHTML='<canvas class="proof-canvas" id="pc-'+pid+'" width="'+CW+'" height="'+CH+'"></canvas>'+
    '<button class="tog-btn" data-togpid="'+pid+'">Demostracion algebraica</button>'+
    '<div class="alg-panel" id="alg-'+pid+'"></div>';
  var cv=document.getElementById('pc-'+pid);
  if(!cv) return;
  var cx2=cv.getContext('2d');
  var t=0;
  var mode='visual';

  window['spm_'+pid]=function(){
    if(mode==='visual'){
      mode='algebraic';
      if(_af[pid]){cancelAnimationFrame(_af[pid]);delete _af[pid];}
      cv.style.display='none';
      var ad=document.getElementById('alg-'+pid);
      var tb=panel.querySelector('.tog-btn');
      ad.style.display='block';
      tb.textContent='Ver animacion visual';
      if(algProof){
        var html='<div style="color:#88ccff;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #1a2a44;padding-bottom:3px;font-size:11px;">'+algProof.label+'</div>';
        algProof.steps.forEach(function(s){
          var col=s.indexOf('OK')>=0||s.charAt(0)==='+' ? '#66ff88':
                  s.indexOf('NO')>=0||s.charAt(0)==='!'?'#ff6644':
                  s.charAt(0)===' '?'#ffee88':'#aac8ff';
          html+='<div style="color:'+col+';">'+s+'</div>';
        });
        ad.innerHTML=html;
      } else {
        ad.innerHTML='<span style="color:#664;">No disponible para este tipo.</span>';
      }
    } else {
      mode='visual'; t=0;
      cv.style.display='block';
      document.getElementById('alg-'+pid).style.display='none';
      panel.querySelector('.tog-btn').textContent='Demostracion algebraica';
      if(proofs[key]) _af[pid]=requestAnimationFrame(proofs[key]);
    }
  };

  // Helpers
  function clr(){ cx2.fillStyle='#07071a'; cx2.fillRect(0,0,CW,CH); }
  function axes(ox,oy,scx,scy){
    cx2.strokeStyle='#2a3a66'; cx2.lineWidth=1;
    cx2.beginPath();cx2.moveTo(0,oy);cx2.lineTo(CW,oy);cx2.stroke();
    cx2.beginPath();cx2.moveTo(ox,0);cx2.lineTo(ox,CH);cx2.stroke();
    cx2.fillStyle='#3a4477'; cx2.font='9px Courier New'; cx2.textAlign='center';
    for(var i=-10;i<=10;i++){
      if(i===0)continue;
      var px=ox+i*scx; if(px>5&&px<CW-5){cx2.beginPath();cx2.moveTo(px,oy-3);cx2.lineTo(px,oy+3);cx2.stroke();if(i%2===0)cx2.fillText(i,px,oy+12);}
      var py2=oy-i*scy; if(py2>5&&py2<CH-5){cx2.beginPath();cx2.moveTo(ox-3,py2);cx2.lineTo(ox+3,py2);cx2.stroke();if(i%2===0){cx2.textAlign='right';cx2.fillText(i,ox-4,py2+3);cx2.textAlign='center';}}
    }
    cx2.fillStyle='#4455aa'; cx2.font='bold 10px Courier New';
    cx2.fillText('x',CW-6,oy-4); cx2.textAlign='left'; cx2.fillText('y',ox+4,10); cx2.textAlign='center';
  }
  function plotF(ox,oy,scx,scy,col,alpha,xMn,xMx){
    cx2.strokeStyle=col+(alpha<1?Math.round(alpha*255).toString(16).padStart(2,'0'):'');
    cx2.lineWidth=2; cx2.beginPath(); var st=false;
    for(var px=0;px<CW;px++){
      var xv=(px-ox)/scx; if(xv<xMn||xv>xMx){st=false;continue;}
      var raw=evalFuncRaw(e.type,e.cfg,xv);
      if(raw===null||!isFinite(raw)||Math.abs(raw)>40){st=false;continue;}
      var py2=oy-raw*scy; if(py2<-20||py2>CH+20){st=false;continue;}
      if(!st){cx2.moveTo(px,py2);st=true;}else cx2.lineTo(px,py2);
    }
    cx2.stroke();
  }
  function hln(oy,y,scy,col,alph,lbl){
    var py2=oy-y*scy; if(py2<0||py2>CH)return;
    cx2.strokeStyle=col;cx2.lineWidth=1.5;cx2.setLineDash([5,4]);cx2.globalAlpha=alph;
    cx2.beginPath();cx2.moveTo(0,py2);cx2.lineTo(CW,py2);cx2.stroke();
    cx2.setLineDash([]);cx2.globalAlpha=1;
    if(lbl){cx2.fillStyle=col;cx2.font='bold 10px Courier New';cx2.textAlign='left';cx2.fillText(lbl,4,py2-3);}
  }
  function vln(ox,x,scx,col,alph,lbl){
    var px=ox+x*scx; if(px<0||px>CW)return;
    cx2.strokeStyle=col;cx2.lineWidth=1.5;cx2.setLineDash([5,4]);cx2.globalAlpha=alph;
    cx2.beginPath();cx2.moveTo(px,0);cx2.lineTo(px,CH);cx2.stroke();
    cx2.setLineDash([]);cx2.globalAlpha=1;
    if(lbl){cx2.fillStyle=col;cx2.font='bold 10px Courier New';cx2.textAlign='center';cx2.fillText(lbl,px,12);}
  }
  function dot(ox,oy,scx,scy,xv,yv,col,r){
    cx2.beginPath();cx2.arc(ox+xv*scx,oy-yv*scy,r||4,0,Math.PI*2);cx2.fillStyle=col;cx2.fill();
  }
  function txt(x,y,s,col,sz,al){
    cx2.fillStyle=col||'#aac8ff';cx2.font=(sz||10)+'px Courier New';cx2.textAlign=al||'left';cx2.fillText(s,x,y);
  }
  function stxt(lines,startY,alpha){
    cx2.globalAlpha=Math.min(1,alpha);
    lines.forEach(function(l,i){
      var col=l.indexOf('OK')>=0||l.charAt(0)==='+'?'#66ff88':l.indexOf('NO')>=0||l.charAt(0)==='!'?'#ff6644':'#aac8ff';
      txt(8,startY+i*15,l,col,10,'left');
    });
    cx2.globalAlpha=1;
  }

  var OX=50, OY=CH/2, SCX=28, SCY=22;

  var proofs={
    dominio: function(){
      clr(); axes(OX,OY,SCX,SCY);
      var prog=Math.min(1,t/120);
      if(e.type==='sqrt'||e.type==='dsqrt'){
        var of2=e.cfg.off||0;
        cx2.fillStyle='rgba(200,40,40,0.18)';cx2.fillRect(0,0,Math.max(0,OX+(-of2)*SCX),CH);
        cx2.fillStyle='rgba(50,200,100,0.12)';cx2.fillRect(Math.max(0,OX+(-of2)*SCX),0,CW,CH);
        vln(OX,-of2,SCX,'#ff4444',0.9,'x='+(-of2));
        plotF(OX,OY,SCX,SCY,e.color,prog,-of2+0.01,12);
        stxt(['Dom de raiz(x+'+of2+'):','Condicion: x+'+of2+' >= 0','x >= '+(-of2),'Dom = ['+(-of2)+', +inf)'],10,prog*3);
      } else if(e.type==='log'||e.type==='dlog'){
        var of3=e.cfg.off||10;
        cx2.fillStyle='rgba(200,40,40,0.18)';cx2.fillRect(0,0,Math.max(0,OX+(-of3)*SCX),CH);
        cx2.fillStyle='rgba(50,200,100,0.12)';cx2.fillRect(Math.max(0,OX+(-of3)*SCX),0,CW,CH);
        vln(OX,-of3,SCX,'#ff4444',0.9,'x='+(-of3));
        plotF(OX,OY,SCX,SCY,e.color,prog,-of3+0.01,10);
        stxt(['ln(x+'+of3+'): argumento > 0','x+'+of3+' > 0','x > '+(-of3),'Dom = ('+(-of3)+', +inf)'],10,prog*3);
      } else if(e.type==='rational'||e.type==='drational'){
        vln(OX,0,SCX,'#ff4444',0.9,'x=0 !');
        cx2.fillStyle='rgba(200,40,40,0.18)';cx2.fillRect(OX-4,0,8,CH);
        plotF(OX,OY,SCX,SCY,e.color,prog,-8,-0.3);
        plotF(OX,OY,SCX,SCY,e.color,prog,0.3,8);
        stxt([e.cfg.k+'/x: x=0 indefinida','x != 0','Dom = R \\ {0}','2 ramas: x<0 y x>0'],10,prog*3);
      } else if(e.type==='tan'||e.type==='dtan'){
        var p2=e.cfg.p||4;
        [-1,0,1].forEach(function(ki){vln(OX,p2*(0.5+ki),SCX,'#ff4444',0.7,''+p2*(0.5+ki));});
        plotF(OX,OY,SCX,SCY,e.color,prog,-6,6);
        stxt(['tan(x/'+p2+')=sin/cos','cos(x/'+p2+')=0 -> indefinida','x != '+p2+'*pi/2+k*'+p2+'*pi','Dom = R \\ {asintolas}'],10,prog*3);
      } else {
        var pr2=Math.min(1,t/80);
        plotF(OX,OY,SCX,SCY,e.color,pr2,-10,10);
        cx2.fillStyle='rgba(50,200,100,0.08)';cx2.fillRect(0,0,CW,CH);
        stxt(['Polinomio/funcion entera','Sin restricciones en x','Para todo x en R definida','Dom = R'],10,pr2*3);
      }
      t++; _af[pid]=requestAnimationFrame(proofs.dominio);
    },
    recorrido: function(){
      clr(); axes(OX,OY,SCX,SCY); var prog=Math.min(1,t/100);
      plotF(OX,OY,SCX,SCY,e.color,1,-10,10);
      if(e.type==='quadratic'){
        var vk2=e.cfg.c-(e.cfg.b||0)*(e.cfg.b||0)/(4*e.cfg.a);
        var isUp=e.cfg.a>0; var pyV=OY-vk2*SCY;
        hln(OY,vk2,SCY,'#ffcc44',prog,'y='+vk2.toFixed(1)+' (vertice)');
        cx2.fillStyle=isUp?'rgba(50,200,100,0.13)':'rgba(200,40,40,0.13)';
        if(isUp)cx2.fillRect(0,0,CW,Math.max(0,pyV));else cx2.fillRect(0,Math.min(CH,pyV),CW,CH);
        dot(OX,OY,SCX,SCY,e.cfg.b?(-e.cfg.b/(2*e.cfg.a)):0,vk2,'#ffcc44',5);
        stxt(['Parabola vertice (h,'+vk2.toFixed(1)+')','a='+e.cfg.a+(e.cfg.a>0?' > 0 abre arriba':' < 0 abre abajo'),
          (e.cfg.a>0?'minimo en y='+vk2.toFixed(1):'maximo en y='+vk2.toFixed(1)),
          'Rec = '+(e.cfg.a>0?'['+vk2.toFixed(1)+',+inf)':'(-inf,'+vk2.toFixed(1)+']')],10,prog*3);
      } else if(e.type==='sin'||e.type==='cos'||e.type==='dsin'||e.type==='dcos'){
        var A2=e.cfg.A||1; var amp2=e.type.startsWith('d')?(A2*(e.cfg.w||1)):A2;
        hln(OY,amp2,SCY,'#ffcc44',prog,'y=+'+amp2);
        hln(OY,-amp2,SCY,'#ff6644',prog,'y=-'+amp2);

    inversa: function(){
      // ── pan/zoom state (initialise once) ──────────────────────────────────
      if(!cv._inv){
        cv._inv={
          panX:0, panY:0,          // offset in canvas pixels
          zoom:1,                  // scale multiplier
          dragging:false,
          lastX:0, lastY:0,
          lastDist:0               // for pinch-zoom
        };
        var iv=cv._inv;
        // Mouse events
        cv.addEventListener('mousedown',function(ev){
          iv.dragging=true;
          iv.lastX=ev.offsetX; iv.lastY=ev.offsetY;
          cv.style.cursor='grabbing';
        });
        cv.addEventListener('mousemove',function(ev){
          if(!iv.dragging)return;
          iv.panX+=ev.offsetX-iv.lastX;
          iv.panY+=ev.offsetY-iv.lastY;
          iv.lastX=ev.offsetX; iv.lastY=ev.offsetY;
        });
        cv.addEventListener('mouseup',function(){iv.dragging=false;cv.style.cursor='grab';});
        cv.addEventListener('mouseleave',function(){iv.dragging=false;cv.style.cursor='grab';});
        // Scroll-wheel zoom (centered on cursor)
        cv.addEventListener('wheel',function(ev){
          ev.preventDefault();
          var rect=cv.getBoundingClientRect();
          var mx=(ev.clientX-rect.left)*(CW/rect.width);
          var my=(ev.clientY-rect.top)*(CH/rect.height);
          var delta=ev.deltaY>0?0.85:1.18;
          iv.zoom=Math.max(0.3,Math.min(8,iv.zoom*delta));
          // keep point under cursor fixed
          iv.panX=mx-(mx-iv.panX)*delta;
          iv.panY=my-(my-iv.panY)*delta;
        },{passive:false});
        // Touch events (pan + pinch)
        cv.addEventListener('touchstart',function(ev){
          ev.preventDefault();
          if(ev.touches.length===1){
            iv.dragging=true;
            iv.lastX=ev.touches[0].clientX; iv.lastY=ev.touches[0].clientY;
          } else if(ev.touches.length===2){
            iv.dragging=false;
            var dx=ev.touches[0].clientX-ev.touches[1].clientX;
            var dy=ev.touches[0].clientY-ev.touches[1].clientY;
            iv.lastDist=Math.sqrt(dx*dx+dy*dy);
          }
        },{passive:false});
        cv.addEventListener('touchmove',function(ev){
          ev.preventDefault();
          if(ev.touches.length===1&&iv.dragging){
            var rect2=cv.getBoundingClientRect();
            var scl=CW/rect2.width;
            iv.panX+=(ev.touches[0].clientX-iv.lastX)*scl;
            iv.panY+=(ev.touches[0].clientY-iv.lastY)*scl;
            iv.lastX=ev.touches[0].clientX; iv.lastY=ev.touches[0].clientY;
          } else if(ev.touches.length===2){
            var dx2=ev.touches[0].clientX-ev.touches[1].clientX;
            var dy2=ev.touches[0].clientY-ev.touches[1].clientY;
            var dist=Math.sqrt(dx2*dx2+dy2*dy2);
            if(iv.lastDist>0){
              var ratio=dist/iv.lastDist;
              iv.zoom=Math.max(0.3,Math.min(8,iv.zoom*ratio));
            }
            iv.lastDist=dist;
          }
        },{passive:false});
        cv.addEventListener('touchend',function(){iv.dragging=false;iv.lastDist=0;});
        cv.style.cursor='grab';
      }

      var iv=cv._inv;

      // ── base square coordinates ────────────────────────────────────────────
      var BASE=CH;            // square side in canvas pixels (before zoom)
      var IOX0=BASE/2, IOY0=BASE/2, ISC0=BASE/6;

      // Apply pan+zoom: origin and scale in actual canvas coords
      var ISC=ISC0*iv.zoom;
      var IOX=IOX0+iv.panX;
      var IOY=IOY0+iv.panY;

      // ── clear & background ────────────────────────────────────────────────
      cx2.fillStyle='#07071a'; cx2.fillRect(0,0,CW,CH);

      // ── grid lines (light) ────────────────────────────────────────────────
      cx2.strokeStyle='#141430'; cx2.lineWidth=0.5;
      var step=ISC; var xStart=((0-IOX)%step+step)%step;
      for(var gx=xStart;gx<CW;gx+=step){cx2.beginPath();cx2.moveTo(gx,0);cx2.lineTo(gx,CH);cx2.stroke();}
      var yStart=((0-IOY)%step+step)%step;
      for(var gy=yStart;gy<CH;gy+=step){cx2.beginPath();cx2.moveTo(0,gy);cx2.lineTo(CW,gy);cx2.stroke();}

      // ── axes ──────────────────────────────────────────────────────────────
      cx2.strokeStyle='#2a3a66'; cx2.lineWidth=1.5;
      cx2.beginPath();cx2.moveTo(0,IOY);cx2.lineTo(CW,IOY);cx2.stroke();
      cx2.beginPath();cx2.moveTo(IOX,0);cx2.lineTo(IOX,CH);cx2.stroke();

      // axis tick labels
      cx2.fillStyle='#4a5590'; cx2.font='8px Courier New'; cx2.textAlign='center';
      var tickInterval=1; if(ISC<20)tickInterval=2; if(ISC<10)tickInterval=5;
      var xMin2=Math.ceil((-IOX)/ISC), xMax2=Math.floor((CW-IOX)/ISC);
      var yMin2=Math.ceil((IOY-CH)/ISC), yMax2=Math.floor(IOY/ISC);
      for(var ii=xMin2;ii<=xMax2;ii+=tickInterval){
        if(ii===0)continue;
        var px2=IOX+ii*ISC;
        if(px2>15&&px2<CW-15){
          cx2.beginPath();cx2.moveTo(px2,IOY-3);cx2.lineTo(px2,IOY+3);cx2.stroke();
          if(ISC>14)cx2.fillText(ii,px2,IOY+12);
        }
      }
      cx2.textAlign='right';
      for(var jj=yMin2;jj<=yMax2;jj+=tickInterval){
        if(jj===0)continue;
        var py3=IOY-jj*ISC;
        if(py3>12&&py3<CH-4){
          cx2.beginPath();cx2.moveTo(IOX-3,py3);cx2.lineTo(IOX+3,py3);cx2.stroke();
          if(ISC>14)cx2.fillText(jj,IOX-5,py3+3);
        }
      }
      cx2.textAlign='left'; cx2.fillStyle='#4455aa'; cx2.font='bold 9px Courier New';
      if(IOX>4&&IOX<CW-4)cx2.fillText('y',IOX+4,12);
      if(IOY>4&&IOY<CH-4){cx2.textAlign='center';cx2.fillText('x',CW-8,IOY-4);}

      // ── y = x symmetry line ───────────────────────────────────────────────
      cx2.strokeStyle='#ffcc44'; cx2.lineWidth=1.2; cx2.setLineDash([5,4]);
      // y=x in canvas: canvasY = IOY - xv*ISC, canvasX = IOX + xv*ISC
      // so canvasY = IOY - (canvasX - IOX) => canvasY = -canvasX + IOX + IOY
      var yx1=Math.max(0,IOX+IOY-CH), yx2=Math.min(CW,IOX+IOY);
      cx2.beginPath();cx2.moveTo(yx1,IOX+IOY-yx1);cx2.lineTo(yx2,IOX+IOY-yx2);cx2.stroke();
      cx2.setLineDash([]);
      cx2.fillStyle='#ffcc4499'; cx2.font='bold 8px Courier New'; cx2.textAlign='left';
      if(yx2>40)cx2.fillText('y = x',yx2-36,IOX+IOY-yx2+10);

      var prog=Math.min(1,t/120);

      // ── plot f ────────────────────────────────────────────────────────────
      function plotSqV(col,alpha){
        cx2.strokeStyle=col+(alpha<1?Math.round(alpha*255).toString(16).padStart(2,'0'):'');
        cx2.lineWidth=2.2; cx2.beginPath(); var st=false;
        for(var px=0;px<CW;px++){
          var xv=(px-IOX)/ISC;
          var raw=evalFuncRaw(e.type,e.cfg,xv);
          if(raw===null||!isFinite(raw)||Math.abs(raw)>30){st=false;continue;}
          var ppy=IOY-raw*ISC;
          if(ppy<-40||ppy>CH+40){st=false;continue;}
          if(!st){cx2.moveTo(px,ppy);st=true;}else cx2.lineTo(px,ppy);
        }
        cx2.stroke();
      }

      // ── Analytic inverse evaluator ────────────────────────────────────────
      // Returns f^-1(yv) analytically when possible, else null (use bisection)
      function analyticalInverse(yv){
        var cfg2=e.cfg;
        switch(e.type){
          case 'linear':
            // f(x)=ax+b  =>  f^-1(y)=(y-b)/a
            if(cfg2.a===0) return null;
            return (yv-(cfg2.b||0))/cfg2.a;
          case 'sqrt':
            // f(x)=sqrt(x+off)  =>  f^-1(y)=y^2-off,  y>=0
            if(yv<0) return null;
            return yv*yv-(cfg2.off||0);
          case 'rational':
            // f(x)=k/x  =>  f^-1(y)=k/y
            if(yv===0) return null;
            return (cfg2.k||4)/yv;
          case 'exp':
            // f(x)=base^(s*x)  =>  f^-1(y)=log_base(y)/s
            if(yv<=0) return null;
            var s=cfg2.s||0.4;
            var b2=cfg2.base||2;
            return Math.log(yv)/(Math.log(b2)*s);
          case 'log':
            // f(x)=ln(x+off)  =>  f^-1(y)=e^y - off
            return Math.exp(yv)-(cfg2.off||10);
          case 'tan':
            // f(x)=tan(x/p)  =>  f^-1(y)=p*arctan(y)
            return (cfg2.p||4)*Math.atan(yv);
          // Derivatives — same types mapped
          case 'dlin':
            return null; // constant, no inverse
          case 'dquad':
            // f'(x)=2ax+b  =>  linear
            if(2*(cfg2.a||1)===0) return null;
            return (yv-(cfg2.b||0))/(2*(cfg2.a||1));
          case 'dlog':
            // f'(x)=1/(x+off)  =>  f'^-1(y)=1/y - off
            if(yv===0) return null;
            return 1/yv-(cfg2.off||10);
          case 'dexp':
            // f'(x)=ln(base)*base^(sx)  =>  solve analytically
            var lb=Math.log(cfg2.base||2), ss=cfg2.s||0.4;
            if(yv<=0||lb<=0) return null;
            return Math.log(yv/lb)/(lb*ss);
          case 'dsqrt':
            // f'(x)=1/(2*sqrt(x+off))  =>  f'^-1(y)=1/(4y^2)-off
            if(yv<=0) return null;
            return 1/(4*yv*yv)-(cfg2.off||0);
          default:
            return null; // use bisection
        }
      }

      // ── Bisection inverse for non-analytic cases ──────────────────────────
      function bisectionInverse(yv, xLo, xHi, iters){
        var fLo=evalFuncRaw(e.type,e.cfg,xLo);
        var fHi=evalFuncRaw(e.type,e.cfg,xHi);
        if(fLo===null||fHi===null) return null;
        if((fLo-yv)*(fHi-yv)>0) return null; // no sign change
        for(var i=0;i<iters;i++){
          var xMid=(xLo+xHi)*0.5;
          var fMid=evalFuncRaw(e.type,e.cfg,xMid);
          if(fMid===null) return null;
          if((fLo-yv)*(fMid-yv)<=0){ xHi=xMid; fHi=fMid; }
          else { xLo=xMid; fLo=fMid; }
        }
        return (xLo+xHi)*0.5;
      }

      // ── Plot f^-1 correctly: iterate over canvas x, compute y=f^-1(x) ────
      // This is f^-1 graphed as a function of x (the input axis),
      // meaning: for each canvas column px, find xv=canvasX->mathX,
      // compute inv_y = f^-1(xv), then plot at canvasY = IOY - inv_y*ISC
      function plotInvSqV(col,alpha){
        cx2.strokeStyle=col+(alpha<1?Math.round(alpha*255).toString(16).padStart(2,'0'):'');
        cx2.lineWidth=2.2; cx2.setLineDash([]);

        // Determine search range for bisection (visible x range in math coords)
        var mathXlo=(-IOX)/ISC, mathXhi=(CW-IOX)/ISC;

        // For each x-value on screen (which is the INPUT to f^-1),
        // compute f^-1(x) analytically or via bisection
        cx2.beginPath(); var st=false;
        for(var px=0;px<CW;px++){
          if(prog<1&&px/CW>prog){break;} // animate drawing

          var xInput=(px-IOX)/ISC; // this is the argument to f^-1

          var yResult=analyticalInverse(xInput);

          if(yResult===null){
            // Bisection over the visible math domain
            // Need monotone bracket — try multiple sub-intervals
            var found2=false;
            var segs2=8;
            var lo2=mathXlo, hi2=mathXhi;
            // Expand range a bit for safety
            lo2=Math.min(lo2,-8); hi2=Math.max(hi2,8);
            var segW=(hi2-lo2)/segs2;
            for(var ss2=0;ss2<segs2;ss2++){
              var a2=lo2+ss2*segW, b2=lo2+(ss2+1)*segW;
              var r2=bisectionInverse(xInput,a2,b2,28);
              if(r2!==null&&isFinite(r2)){
                yResult=r2; found2=true; break;
              }
            }
            if(!found2){st=false;continue;}
          }

          if(!isFinite(yResult)||Math.abs(yResult)>40){st=false;continue;}
          var ppy2=IOY-yResult*ISC;
          if(ppy2<-40||ppy2>CH+40){st=false;continue;}
          if(!st){cx2.moveTo(px,ppy2);st=true;}else cx2.lineTo(px,ppy2);
        }
        cx2.stroke();
      }

      plotSqV(e.color,1);

      // labels
      cx2.font='bold 10px Courier New'; cx2.textAlign='left';
      cx2.fillStyle=e.color; cx2.fillText('f',6,14);

      if(d.inversa){
        plotInvSqV('#ff88cc',prog);
        cx2.fillStyle='#ff88cc'; cx2.fillText('f\u207b\u00b9',6,26);
        // info strip on right if space
        if(CW>BASE+60){
          var RX=BASE+8;
          txt(RX,16,'f\u207b\u00b9 = reflejo','#aac8ff',9,'left');
          txt(RX,30,d.inversaDef?d.inversaDef.slice(0,22):'existe','#ffee88',9,'left');
          txt(RX,46,'Simetria en y=x','#66ff88',9,'left');
        }
      } else {
        plotInvSqV('#ff4455',prog*0.5);
        cx2.fillStyle='#ff6644'; cx2.font='9px Courier New'; cx2.textAlign='center';
        cx2.fillText('Reflejo no es funcion',IOX,CH-6);
        if(CW>BASE+60){
          var RX2=BASE+8;
          txt(RX2,16,'Reflejo en y=x:','#aac8ff',9,'left');
          txt(RX2,30,'2 valores y por x','#ff6644',9,'left');
          txt(RX2,46,'No es funcion','#ff6644',9,'left');
          txt(RX2,60,'Sin inversa global','#ff6644',9,'left');
        }
      }

      // ── hint overlay ──────────────────────────────────────────────────────
      cx2.fillStyle='rgba(10,10,30,0.72)'; cx2.fillRect(0,CH-16,CW,16);
      cx2.fillStyle='#445577'; cx2.font='8px Courier New'; cx2.textAlign='center';
      cx2.fillText('Arrastra para mover | Scroll / pinch para zoom',CW/2,CH-4);

      t++; _af[pid]=requestAnimationFrame(proofs.inversa);
    }

// FUNCTION EVALUATOR
function evalFuncRaw(type, cfg, x){
  switch(type){
    case 'linear':    return cfg.a*x+(cfg.b||0);
    case 'quadratic': return cfg.a*x*x+(cfg.b||0)*x+(cfg.c||0);
    case 'cubic':     return x*x*x+(cfg.a||0)*x+(cfg.b||0);
    case 'sqrt':      return x+(cfg.off||0)>=0?Math.sqrt(x+(cfg.off||0)):null;
    case 'sin':       return (cfg.A||1)*Math.sin((cfg.w||1)*x+(cfg.phi||0));
    case 'cos':       return (cfg.A||1)*Math.cos((cfg.w||1)*x+(cfg.phi||0));
    case 'rational':  return Math.abs(x)<0.3?null:(cfg.k||4)/x;
    case 'log':       return x+(cfg.off||10)>0?Math.log(x+(cfg.off||10)):null;
    case 'exp':       return (cfg.base||2)**(x*(cfg.s||0.4));
    case 'tan':{var tv=x/(cfg.p||4);return Math.abs(Math.cos(tv))<0.08?null:Math.tan(tv);}
    case 'dlin':      return cfg.a||2;
    case 'dquad':     return 2*(cfg.a||1)*x+(cfg.b||0);
    case 'dcubic':    return 3*x*x+(cfg.a||0);
    case 'dsqrt':     return x+(cfg.off||0)>0?1/(2*Math.sqrt(x+(cfg.off||0))):null;
    case 'dsin':      return (cfg.A||1)*(cfg.w||1)*Math.cos((cfg.w||1)*x);
    case 'dcos':      return -(cfg.A||1)*(cfg.w||1)*Math.sin((cfg.w||1)*x);
    case 'drational': return -(cfg.k||4)/(x*x+0.001);
    case 'dlog':      return x+(cfg.off||10)>0?1/(x+(cfg.off||10)):null;
    case 'dexp':      return Math.log(cfg.base||2)*(cfg.base||2)**(x*(cfg.s||0.4))*(cfg.s||0.4);
    case 'dtan':{var tv2=x/(cfg.p||4);return Math.abs(Math.cos(tv2))<0.08?null:1/((cfg.p||4)*Math.cos(tv2)*Math.cos(tv2));}
    // Integral types reuse base function shapes
    case 'iquad':     return (cfg.a||1)/2*x*x+(cfg.b||0)*x;
    case 'icubic':    return (cfg.a||1)/3*x*x*x+(cfg.b||0)/2*x*x+(cfg.c||0)*x;
    case 'isin':      return -(cfg.A||1)/(cfg.w||1)*Math.cos((cfg.w||1)*x);
    case 'icos':      return (cfg.A||1)/(cfg.w||1)*Math.sin((cfg.w||1)*x);
    case 'iexp':      return (cfg.base||2)**(x*(cfg.s||1));
    case 'ilog':      return x>0?x*(Math.log(x)-1):null;
    default: return 0;
  }
}

function evalFunc(type, cfg, cx){
  var x=(cx-MID_X)*0.55;
  return evalFuncRaw(type, cfg, x);
}

function buildPath(cfg){
  var segs=[];
  for(var cx=2;cx<COLS-2;cx++){
    var raw=evalFunc(cfg.type, cfg, cx);
    if(raw===null||!isFinite(raw)||Math.abs(raw)>30)continue;
    var cy=MID_Y-Math.round(raw*1.5);
    if(cy>=1&&cy<ROWS-1) segs.push({x:cx,y:cy});
  }
  if(segs.length<5){segs=[];for(var cx2=4;cx2<COLS-4;cx2++)segs.push({x:cx2,y:MID_Y});}
  return segs;
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// EDO SYSTEM — Ecuaciones Diferenciales Ordinarias (Nivel 19+)
// Estructura: cada EDO tiene curvas-solución como serpientes minions (fáciles)
//             + la solución general como JEFE (mucha vida, flota con math)
// ═══════════════════════════════════════════════════════════════════════════

// ── Evaluador de soluciones de EDO ─────────────────────────────────────────
function evalEDOSolution(edoType, cfg, t, C){
  switch(edoType){
    // Newton: T(t) = Ta + (T0-Ta)*e^(-k*t), curvas para distintos C=(T0-Ta)
    case 'newton':
      return cfg.Ta + C * Math.exp(-cfg.k * t);
    // Crecimiento logístico: P(t) = K/(1 + ((K-P0)/P0)*e^(-r*t))
    case 'logistic':
      return cfg.K / (1 + C * Math.exp(-cfg.r * t));
    // Caida libre con resistencia: v(t) = mg/b + C*e^(-b/m * t)
    case 'falllib':
      return cfg.vt + C * Math.exp(-cfg.bm * t);
    // Circuito RC: q(t) = CE + C*e^(-t/(RC))
    case 'rc':
      return cfg.qinf + C * Math.exp(-cfg.tau * t);
    default: return 0;
  }
}

// ── Construir path de curva-solución en el canvas del juego ───────────────
function buildEDOPath(edoType, cfg, C){
  var segs=[];
  // Mapeamos t en [tMin, tMax] -> columnas del canvas
  var tMin=cfg.tMin||0, tMax=cfg.tMax||10;
  for(var cx=2;cx<COLS-2;cx++){
    var t=(cx/COLS)*(tMax-tMin)+tMin;
    var raw=evalEDOSolution(edoType,cfg,t,C);
    if(raw===null||!isFinite(raw))continue;
    // Escalar: centrar en MID_Y, 1 unidad del dominio = escale px
    var scaled=(raw-cfg.yCenter)*cfg.yScale;
    var cy=MID_Y-Math.round(scaled);
    if(cy>=1&&cy<ROWS-1) segs.push({x:cx,y:cy});
  }
  if(segs.length<5) return null;
  return segs;
}

function buildAsintotaPath(yVal, cfg){
  // Jefe se mueve a lo largo de la asintota horizontal (temperatura ambiente)
  var segs=[];
  for(var cx=2;cx<COLS-2;cx++){
    var scaled=(yVal - cfg.yCenter)*cfg.yScale;
    var cy=MID_Y-Math.round(scaled);
    if(cy<1)cy=1; if(cy>ROWS-2)cy=ROWS-2;
    segs.push({x:cx,y:cy});
  }
  return segs;
}

function buildFlatPath(row){
  var segs=[];
  for(var cx=4;cx<COLS-4;cx++) segs.push({x:cx,y:row});
  return segs;
}

// ── Construir nivel EDO ──────────────────────────────────────────────────
function buildEDOLevel(idx){
  var gen=EDO_POOL[idx%EDO_POOL.length];
  var lvlData=gen();

  // Inicializar boss como enemy object
  var boss=lvlData.boss;
  boss.segments=buildEDOSegments(boss.path, 14);
  boss.pathIdx=Math.floor(boss.path.length*0.5);
  boss.pathDir=1; boss.moveTimer=0;
  boss.shootTimer=0;
  boss.shootInterval=1800;
  boss.shootCount=4;
  boss.bullets=999;
  boss.dead=false; boss.grow=0;

  // Minions
  var minions=lvlData.minions.map(function(m,i){
    var path=m.path||buildFlatPath(MID_Y);
    var si=Math.floor(path.length*(0.2+i*0.2));
    if(si>=path.length)si=0;
    m.segments=buildEDOSegments(path, 7);
    m.pathIdx=si; m.pathDir=1; m.moveTimer=0;
    m.shootTimer=Math.random()*3000;
    m.shootInterval=3500+Math.random()*2000;
    m.shootCount=1; m.bullets=999; m.dead=false; m.grow=0;
    return m;
  });

  // All enemies = minions first, boss last (so HUD shows boss last)
  return{
    name:lvlData.name, phase:'edo',
    edoType:lvlData.edoType, cfg:lvlData.cfg,
    enemies:minions.concat([boss])
  };
}

function buildEDOSegments(path, len){
  var segs=[];
  var si=Math.floor(path.length*0.3);
  for(var k=0;k<len;k++){
    var idx=clamp(si-k,0,path.length-1);
    segs.push(Object.assign({},path[idx]));
  }
  return segs;
}

// ── Render del jefe EDO (floating math overlay) ──────────────────────────
var edoBossGlow=0;
function drawEDOBoss(e){
  if(!e||e.dead)return;
  // Draw segments normally
  drawSnake(e.segments,e.color,false);
  // Floating math text above boss head
  var h=e.segments[0];
  var px=h.x*CELL+CELL/2;
  var py=h.y*CELL-8;
  edoBossGlow=(edoBossGlow+0.04)%(Math.PI*2);
  var pulse=0.7+0.3*Math.sin(edoBossGlow);
  // Glow ring
  ctx.save();
  ctx.globalAlpha=pulse*0.5;
  ctx.strokeStyle='#ff44ff';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(px,h.y*CELL+CELL/2,CELL*2,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  // Math formula floating above
  ctx.font='bold 9px Courier New';
  ctx.textAlign='center';
  ctx.fillStyle='#ff44ff';
  var alpha=Math.round(pulse*255).toString(16).padStart(2,'0');
  ctx.fillStyle='#ff88ff'+alpha;
  ctx.fillText(e.math1||e.fx, px, Math.max(10,py-10));
  ctx.fillText(e.math2||'', px, Math.max(20,py));
  ctx.restore();
}

function drawEDOFamilyGraph(e){
  var cv=document.getElementById('edo-graph-'+e.id);
  if(!cv)return;
  var CW2=400,CH2=180;
  cv.width=CW2; cv.height=CH2;

  // ── Pan/zoom state ────────────────────────────────────────────────────
  if(!cv._pz){
    cv._pz={panX:0,panY:0,zoom:1,dragging:false,lastX:0,lastY:0,lastDist:0};
    var pz=cv._pz;
    cv.addEventListener('mousedown',function(ev){pz.dragging=true;pz.lastX=ev.offsetX;pz.lastY=ev.offsetY;cv.style.cursor='grabbing';});
    cv.addEventListener('mousemove',function(ev){if(!pz.dragging)return;pz.panX+=ev.offsetX-pz.lastX;pz.panY+=ev.offsetY-pz.lastY;pz.lastX=ev.offsetX;pz.lastY=ev.offsetY;});
    cv.addEventListener('mouseup',function(){pz.dragging=false;cv.style.cursor='grab';});
    cv.addEventListener('mouseleave',function(){pz.dragging=false;cv.style.cursor='grab';});
    cv.addEventListener('wheel',function(ev){
      ev.preventDefault();
      var rect=cv.getBoundingClientRect();
      var mx=(ev.clientX-rect.left)*(CW2/rect.width);
      var my=(ev.clientY-rect.top)*(CH2/rect.height);
      var delta=ev.deltaY>0?0.82:1.22;
      pz.zoom=Math.max(0.2,Math.min(12,pz.zoom*delta));
      pz.panX=mx-(mx-pz.panX)*delta;
      pz.panY=my-(my-pz.panY)*delta;
    },{passive:false});
    cv.addEventListener('touchstart',function(ev){
      ev.preventDefault();
      if(ev.touches.length===1){pz.dragging=true;pz.lastX=ev.touches[0].clientX;pz.lastY=ev.touches[0].clientY;}
      else if(ev.touches.length===2){pz.dragging=false;var dx=ev.touches[0].clientX-ev.touches[1].clientX,dy=ev.touches[0].clientY-ev.touches[1].clientY;pz.lastDist=Math.sqrt(dx*dx+dy*dy);}
    },{passive:false});
    cv.addEventListener('touchmove',function(ev){
      ev.preventDefault();
      if(ev.touches.length===1&&pz.dragging){var r2=cv.getBoundingClientRect(),sc=CW2/r2.width;pz.panX+=(ev.touches[0].clientX-pz.lastX)*sc;pz.panY+=(ev.touches[0].clientY-pz.lastY)*sc;pz.lastX=ev.touches[0].clientX;pz.lastY=ev.touches[0].clientY;}
      else if(ev.touches.length===2){var dx2=ev.touches[0].clientX-ev.touches[1].clientX,dy2=ev.touches[0].clientY-ev.touches[1].clientY,dist=Math.sqrt(dx2*dx2+dy2*dy2);if(pz.lastDist>0){var ratio=dist/pz.lastDist;pz.zoom=Math.max(0.2,Math.min(12,pz.zoom*ratio));}pz.lastDist=dist;}
    },{passive:false});
    cv.addEventListener('touchend',function(){pz.dragging=false;pz.lastDist=0;});
    cv.style.cursor='grab';
  }
  var pz=cv._pz;

  var bcfg=e.cfg||{k:0.1,Ta:22,tMin:0,tMax:12};
  var Cvals=[80,60,40,20,-20,-40];
  var cols2=['#ff6622','#ffaa22','#ffdd44','#88ffaa','#44aaff','#8888ff'];

  // Base coords (before pan/zoom): origin at left-center, t axis horizontal
  var OX0=40, OY0=CH2/2;
  var scx0=(CW2-55)/bcfg.tMax;  // 1 time unit in px at zoom=1
  var scy0=6;                     // 1 temp unit in px at zoom=1

  var cx3=cv.getContext('2d');

  function renderEDOFrame(){
    var pz2=cv._pz; if(!pz2)return;
    var OX=OX0+pz2.panX, OY=OY0+pz2.panY;
    var scx=scx0*pz2.zoom, scy=scy0*pz2.zoom;

    cx3.fillStyle='#05051a'; cx3.fillRect(0,0,CW2,CH2);

    // Grid
    cx3.strokeStyle='#0e0e2a'; cx3.lineWidth=0.5;
    var gstep=scx; var gxS=((0-OX)%gstep+gstep)%gstep;
    for(var gx=gxS;gx<CW2;gx+=gstep){cx3.beginPath();cx3.moveTo(gx,0);cx3.lineTo(gx,CH2);cx3.stroke();}
    var gstepY=scy; var gyS=((0-OY)%gstepY+gstepY)%gstepY;
    for(var gy2=gyS;gy2<CH2;gy2+=gstepY){cx3.beginPath();cx3.moveTo(0,gy2);cx3.lineTo(CW2,gy2);cx3.stroke();}

    // Axes
    cx3.strokeStyle='#2a3a66'; cx3.lineWidth=1.2;
    if(OY>0&&OY<CH2){cx3.beginPath();cx3.moveTo(0,OY);cx3.lineTo(CW2,OY);cx3.stroke();}
    if(OX>0&&OX<CW2){cx3.beginPath();cx3.moveTo(OX,0);cx3.lineTo(OX,CH2);cx3.stroke();}

    // Tick labels
    cx3.fillStyle='#4a5590'; cx3.font='8px Courier New'; cx3.textAlign='center';
    var tInt=1; if(scx<15)tInt=2; if(scx<8)tInt=5;
    var tLo=Math.ceil((-OX)/scx), tHi=Math.floor((CW2-OX)/scx);
    for(var tt=tLo;tt<=tHi;tt+=tInt){
      if(tt<0)continue;
      var ptx=OX+tt*scx;
      if(ptx>15&&ptx<CW2-5){cx3.beginPath();cx3.moveTo(ptx,OY-2);cx3.lineTo(ptx,OY+2);cx3.stroke();if(scx>8)cx3.fillText(tt,ptx,OY+11);}
    }
    var yLo=Math.ceil((OY-CH2)/scy), yHi=Math.floor(OY/scy);
    cx3.textAlign='right';
    for(var yy=yLo;yy<=yHi;yy+=tInt){
      var pty=OY-yy*scy;
      if(pty>5&&pty<CH2-2){cx3.beginPath();cx3.moveTo(OX-2,pty);cx3.lineTo(OX+2,pty);cx3.stroke();if(scy>6)cx3.fillText(bcfg.Ta+yy,OX-4,pty+3);}
    }

    // Axis labels
    cx3.fillStyle='#4455aa'; cx3.font='bold 8px Courier New'; cx3.textAlign='center';
    cx3.fillText('t (min)',CW2-24,OY-3);
    cx3.textAlign='left'; cx3.fillText('T(°C)',OX+3,11);

    // Asymptote Ta
    var pyTa=OY; // Ta maps to 0 offset -> center
    cx3.strokeStyle='#44aaff55'; cx3.lineWidth=1; cx3.setLineDash([5,4]);
    cx3.beginPath();cx3.moveTo(0,pyTa);cx3.lineTo(CW2,pyTa);cx3.stroke();cx3.setLineDash([]);
    cx3.fillStyle='#44aaff88'; cx3.font='7px Courier New'; cx3.textAlign='left';
    if(pyTa>6&&pyTa<CH2-4)cx3.fillText('T_a='+bcfg.Ta+'°C',OX+4,pyTa-3);

    // Draw solution curves
    Cvals.forEach(function(C,i){
      cx3.strokeStyle=cols2[i]; cx3.lineWidth=1.8; cx3.beginPath();
      var started3=false;
      var tLo2=Math.max(0,(-OX)/scx), tHi2=bcfg.tMax*2;
      for(var px=Math.max(0,OX);px<CW2;px++){
        var tv=(px-OX)/scx;
        if(tv<0){started3=false;continue;}
        var Tv=evalEDOSolution(e.edoType||'newton',bcfg,tv,C);
        // Tv is absolute temperature; offset from Ta for canvas
        var dy2=(Tv-bcfg.Ta)*scy;
        var ppy=OY-dy2;
        if(ppy<-20||ppy>CH2+20){started3=false;continue;}
        if(!started3){cx3.moveTo(px,ppy);started3=true;}else cx3.lineTo(px,ppy);
      }
      cx3.stroke();
      // Label at leftmost visible point
      var tFirst=Math.max(0,(-OX)/scx);
      var TFirst=evalEDOSolution(e.edoType||'newton',bcfg,tFirst,C);
      var pyFirst=OY-(TFirst-bcfg.Ta)*scy;
      if(pyFirst>8&&pyFirst<CH2-4&&OX>10){
        cx3.fillStyle=cols2[i]; cx3.font='7px Courier New'; cx3.textAlign='left';
        cx3.fillText('T0='+(bcfg.Ta+C),OX+3,pyFirst-2);
      }
    });

    // Hint
    cx3.fillStyle='rgba(5,5,26,0.75)'; cx3.fillRect(0,CH2-14,CW2,14);
    cx3.fillStyle='#334466'; cx3.font='7px Courier New'; cx3.textAlign='center';
    cx3.fillText('Arrastra | Scroll/pinch para zoom',CW2/2,CH2-3);
  }

  // Animate loop
  var edoFamAnimId;
  function edoFamLoop(){
    renderEDOFrame();
    edoFamAnimId=requestAnimationFrame(edoFamLoop);
    if(!document.getElementById('edo-graph-'+e.id)){
      cancelAnimationFrame(edoFamAnimId);
    }
  }
  edoFamAnimId=requestAnimationFrame(edoFamLoop);
  if(!window._edoAnims)window._edoAnims=[];
  window._edoAnims.push(edoFamAnimId);
}

function drawEDOAppGraph(e){
  var cv=document.getElementById('edo-app-'+e.id);
  if(!cv)return;
  var cx2=cv.getContext('2d'); var CW=400,CH=160;
  var ed=e.edoDef;
  if(!ed||!ed.aplicacion)return;
  var ap=ed.aplicacion;
  var k=ap.k, Ta=ap.Ta, T0=ap.T0, tMax=ap.tMax||15;

  cx2.fillStyle='#050510';cx2.fillRect(0,0,CW,CH);
  var OX=45,OY=CH-30,scx=(CW-55)/tMax,scyA=(CH-40)/(T0-Ta+10);

  // axes
  cx2.strokeStyle='#2a3a66';cx2.lineWidth=1;
  cx2.beginPath();cx2.moveTo(OX,10);cx2.lineTo(OX,OY);cx2.stroke();
  cx2.beginPath();cx2.moveTo(OX,OY);cx2.lineTo(CW-5,OY);cx2.stroke();
  cx2.fillStyle='#556688';cx2.font='8px Courier New';cx2.textAlign='center';
  cx2.fillText('t (min)',CW-22,OY+12);
  cx2.textAlign='right';cx2.fillText('T (°C)',OX-2,14);

  // tick labels y
  cx2.textAlign='right';
  [Ta, Ta+20, Ta+40, T0].forEach(function(yv){
    var py2=OY-(yv-Ta)*scyA;
    if(py2>10&&py2<OY){
      cx2.fillText(yv,OX-3,py2+3);
      cx2.beginPath();cx2.moveTo(OX-3,py2);cx2.lineTo(OX,py2);cx2.stroke();
    }
  });

  // asintota Ta
  cx2.strokeStyle='#44aaff33';cx2.lineWidth=1;cx2.setLineDash([4,4]);
  cx2.beginPath();cx2.moveTo(OX,OY);cx2.lineTo(CW,OY);cx2.stroke();
  cx2.setLineDash([]);
  cx2.fillStyle='#44aaff88';cx2.font='7px Courier New';cx2.textAlign='left';
  cx2.fillText('T_a='+Ta+'°C',OX+3,OY-3);

  // animate: draw the curve progressively using requestAnimationFrame
  var frame=0, totalFrames=120;
  var animId;
  function anim(){
    var prog=Math.min(1,frame/totalFrames);
    cx2.fillStyle='#050510';cx2.fillRect(OX+1,0,CW,OY-1);

    // curve T(t) for t in [0, tMax*prog]
    cx2.strokeStyle='#ff8844';cx2.lineWidth=2.5;cx2.beginPath();
    var started2=false;
    for(var px=OX;px<OX+(CW-OX-5)*prog;px++){
      var tv=(px-OX)/scx;
      var Tv=Ta+(T0-Ta)*Math.exp(-k*tv);
      var py2=OY-(Tv-Ta)*scyA;
      if(py2<10||py2>OY){started2=false;continue;}
      if(!started2){cx2.moveTo(px,py2);started2=true;}else cx2.lineTo(px,py2);
    }
    cx2.stroke();

    // t=10 marker
    if(prog>0.7){
      var px10=OX+10*scx;
      var T10=Ta+(T0-Ta)*Math.exp(-k*10);
      var py10=OY-(T10-Ta)*scyA;
      cx2.strokeStyle='#ff4444';cx2.lineWidth=1.5;cx2.setLineDash([3,3]);
      cx2.beginPath();cx2.moveTo(px10,OY);cx2.lineTo(px10,py10);cx2.stroke();
      cx2.beginPath();cx2.moveTo(OX,py10);cx2.lineTo(px10,py10);cx2.stroke();
      cx2.setLineDash([]);
      cx2.fillStyle='#ff8888';cx2.font='bold 9px Courier New';cx2.textAlign='center';
      cx2.fillText('t=10',px10,OY+12);
      cx2.textAlign='right';
      cx2.fillText(T10.toFixed(1)+'°C',OX-2,py10+3);
      // dot
      cx2.beginPath();cx2.arc(px10,py10,4,0,Math.PI*2);
      cx2.fillStyle='#ff4444';cx2.fill();
    }

    // T0 label
    cx2.fillStyle='#ffaa44';cx2.font='8px Courier New';cx2.textAlign='left';
    cx2.fillText('T0='+T0+'°C',OX+3,OY-(T0-Ta)*scyA-3);

    frame++;
    if(frame<totalFrames+60) animId=requestAnimationFrame(anim);
  }
  animId=requestAnimationFrame(anim);
  // store to cancel when panel closes
  if(!window._edoAnims) window._edoAnims=[];
  window._edoAnims.push(animId);
}

function killEDOEnemy(e){
  e.dead=true; kills++; score+=e.isBoss?500*(level+1):50*(level+1);
  startDeathAnim(e, e.segments.map(function(s){return Object.assign({},s);}));
  player.hp=Math.min(player.maxHp, player.hp+(e.isBoss?30:8));

  var ov=document.getElementById('overlay');
  var mathDiv=document.getElementById('ov-math');
  var btn=document.getElementById('ov-btn');

    // Minion: breve mensaje, continuar
    document.getElementById('ov-title').textContent='Curva eliminada: '+e.name;
    document.getElementById('ov-phase-banner').style.display='none';
    document.getElementById('ov-desc').textContent='Esta curva es una solucion particular. El jefe (Solucion General) sigue vivo!';
    mathDiv.style.display='block';
    mathDiv.innerHTML='<div style="background:#0a0a1a;border:1px solid #334466;border-radius:6px;padding:10px;font-family:Courier New,monospace;font-size:10px;color:#aac8ff;">'+
      '<div style="color:#ffcc44;font-weight:bold;margin-bottom:4px;">'+e.fx+'</div>'+
      '<div>Esta es una <strong>solucion particular</strong> de la EDO.</div>'+
      '<div>Condicion inicial implicita: C = '+e.C+'</div>'+
      '<div style="margin-top:6px;color:#88ff88;">La familia completa: T(t) = T_a + C·e^(-kt)  con C arbitrario.</div>'+
    '</div>';
    var alive=enemies.filter(function(en){return!en.dead;});
    btn.textContent='Continuar — '+alive.length+' restante'+(alive.length>1?'s':'');
    btn.onclick=function(){ov.style.display='none';gameState='playing';};
    gameState='info';
    ov.style.display='flex';
    return;
  }

  // BOSS killed: full EDO card
  document.getElementById('ov-title').textContent='JEFE VENCIDO: Solucion General';
  document.getElementById('ov-phase-banner').style.display='block';
  document.getElementById('ov-phase-banner').textContent='Has dominado la EDO de Newton!';
  document.getElementById('ov-desc').textContent='La solucion general fue vencida. Aqui esta todo lo que aprendiste:';
  mathDiv.style.display='block';
  mathDiv.innerHTML=buildEDOCard(e);
  renderEDOGraphs(e);

  var alive2=enemies.filter(function(en){return!en.dead;});
  if(alive2.length>0){
    btn.textContent='Continuar (quedan minions)';
    btn.onclick=function(){ov.style.display='none';gameState='playing';};
  } else {

      btn.textContent='Siguiente: '+LEVELS[level+1].name;

      btn.textContent='Juego COMPLETADO! Reiniciar';
      btn.onclick=function(){level=0;score=0;kills=0;LEVELS=generateAllLevels();showIntro();};
    }
  }
  gameState='info';
  ov.style.display='flex';
}

function generateAllLevels(){
  var levels=[];
  var fN=['Lineal','Cuadraticas','Cubica & Raiz','Trigonometricas','Racional & Exponencial','Trascendentales'];
  var iN=['Int. Lineal','Int. Cuadratica','Int. Trigonometricas','Int. Exponencial','Int. Logaritmo','Int. Mixta Final'];
  FUNC_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+1)+' - '+fN[i],phase:'func',enemies:buildLevel(tpl,'func')});
  });
  DERIV_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+7)+' - Derivada: '+fN[i],phase:'deriv',enemies:buildLevel(tpl,'deriv')});
  });
  INTEG_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+13)+' - Integral: '+iN[i],phase:'integ',enemies:buildLevelInteg(tpl)});
  });
  // EDO level (Nivel 19)
  var edoLvl=buildEDOLevel(0);
  levels.push(edoLvl);
  return levels;
}

// DEATH ANIMATION
var deathAnims=[];
function startDeathAnim(e,segs){deathAnims.push({e:e,t:0,segs:segs});}
function updateDeathAnims(dt){
  deathAnims.forEach(function(da){da.t+=dt/1200;if(da.t>1)da.t=1;});
  deathAnims=deathAnims.filter(function(da){return da.t<1;});
}
function drawDeathAnims(){
  dCtx.clearRect(0,0,W,H);
  deathAnims.forEach(function(da){
    var e=da.e,t=da.t;
    if(t<0.4){
      var alpha=1-t/0.4;
      da.segs.forEach(function(s,i){
        var sc=(t/0.4)*3*(i%3===0?-1:1);
        var sx=s.x*CELL+CELL/2+sc*CELL,sy=s.y*CELL+CELL/2+sc*CELL*0.5;
        var r=(CELL/2)*(1-t/0.4)*0.8;
        dCtx.beginPath();dCtx.arc(sx,sy,Math.max(1,r),0,Math.PI*2);
        var hex=Math.round(alpha*255).toString(16).padStart(2,'0');
        dCtx.fillStyle=e.color+hex;dCtx.fill();
      });
    } else {
      var prog=(t-0.4)/0.6;
      var al=Math.min(1,prog*2);
      var ha=Math.round(al*220).toString(16).padStart(2,'0');
      dCtx.strokeStyle='#334466aa';dCtx.lineWidth=0.8;
      dCtx.beginPath();dCtx.moveTo(ORIG_X,0);dCtx.lineTo(ORIG_X,H);dCtx.stroke();
      dCtx.beginPath();dCtx.moveTo(0,ORIG_Y);dCtx.lineTo(W,ORIG_Y);dCtx.stroke();
      dCtx.strokeStyle=e.color+ha;dCtx.lineWidth=2.5;dCtx.setLineDash([]);dCtx.beginPath();
      var started=false;
      var maxX=Math.round(prog*(COLS-4));
      for(var cx=2;cx<=maxX;cx++){
        var raw=evalFunc(e.type,e.cfg,cx);
        if(raw===null||!isFinite(raw)||Math.abs(raw)>30){started=false;continue;}
        var cy=MID_Y-raw*1.5;
        var px=cx*CELL+CELL/2,py=cy*CELL+CELL/2;
        if(py<0||py>H){started=false;continue;}
        if(!started){dCtx.moveTo(px,py);started=true;}else dCtx.lineTo(px,py);
      }
      dCtx.stroke();
      if(prog>0.6){
        var la=Math.round(((prog-0.6)/0.4)*200).toString(16).padStart(2,'0');
        dCtx.font='bold 13px Courier New';dCtx.fillStyle=e.color+la;
        dCtx.textAlign='left';dCtx.fillText(e.fx,8,18);
      }
    }
  });
}

// PLAYER & ENEMIES
function initPlayer(){
  player={
    segments:[{x:MID_X,y:MID_Y+10},{x:MID_X-1,y:MID_Y+10},{x:MID_X-2,y:MID_Y+10}],
    dir:{x:1,y:0},nextDir:{x:1,y:0},
    hp:100+level*20,maxHp:100+level*20,
    dmg:25+level*18,
    maxBullets:6+level*2,bullets:6+level*2,
    reloadTime:Math.max(300,1200-level*70),reloadTimer:0,
    color:'#44ff88',grow:0
  };
}

function initEnemies(){
  enemies=LEVELS[level].enemies.map(function(cfg,i){
    var path=buildPath(cfg);
    var si=clamp(Math.floor(path.length*(0.3+i*0.25)),0,path.length-1);
    var bodyLen=9+level*2;
    var segs=[];
    for(var kk=0;kk<bodyLen;kk++) segs.push(Object.assign({},path[clamp(si-kk,0,path.length-1)]));
    var isInteg=level>=12;
    var sc=isInteg?Math.min(6,3+Math.floor((level-12)/2)):Math.min(4,1+Math.floor(level/3));
    var hpM=isInteg?1.6:1, dmM=isInteg?1.5:1, spM=isInteg?0.75:1;
    return Object.assign({},cfg,{
      segments:segs,
      hp:Math.round((cfg.hp+level*18)*hpM),maxHp:Math.round((cfg.hp+level*18)*hpM),
      dmg:Math.round((cfg.dmg+level*2)*dmM),speed:Math.round(cfg.speed*spM),
      path:path,pathIdx:si,pathDir:1,moveTimer:0,
      shootTimer:Math.random()*2000,
      shootInterval:Math.max(500,2200-level*120)+Math.random()*800,
      shootCount:sc,bullets:sc*(4+level)*(isInteg?2:1),dead:false,grow:0
    });
  });
}

function startLevel(){
  var ph=LEVELS[level].phase;
  if(ph==='func'){
    var tpl=FUNC_TPL[level];
    LEVELS[level].enemies=buildLevel(tpl,'func');
  } else if(ph==='deriv'){
    var tpl2=DERIV_TPL[level-6];
    LEVELS[level].enemies=buildLevel(tpl2,'deriv');
  } else if(ph==='integ'){
    var tpl3=INTEG_TPL[level-12];
    LEVELS[level].enemies=buildLevelInteg(tpl3);
  } else if(ph==='edo'){
    var edoLvl=buildEDOLevel(0);
    LEVELS[level].enemies=edoLvl.enemies;
  }
  initPlayer();initEnemies();
  playerBullets=[];enemyBullets=[];deathAnims=[];
  gameState='playing';
  if(!_deathCount[level]) _deathCount[level]=0; // keep existing count, only reset on surrender
  updateHUD();updateEnemyHUD();
  document.getElementById('overlay').style.display='none';
  Object.keys(_af).forEach(function(k){cancelAnimationFrame(_af[k]);delete _af[k];});
}

// HUD

  document.getElementById('h-lvl').textContent=level+1;
  var ph=level<6?'Funciones':level<12?'Derivadas':level<18?'Integrales':'EDOs';
  document.getElementById('h-phase').textContent=ph;
