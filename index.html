function renderEDOGraphs(e){
  var ed=e.edoDef;
  if(!ed)return;
  setTimeout(function(){
    drawEDOFamilyGraph(e);
    drawEDOAppGraph(e);
  },100);
}

function drawEDOFamilyGraph(e){
  var cv=document.getElementById('edo-graph-'+e.id);
  if(!cv)return;
  var CW2=400,CH2=180;
  cv.width=CW2; cv.height=CH2;

  // ── Pan/zoom state ────────────────────────────────────────────────────
  if(!cv._pz){
    cv._pz={panX:0,panY:0,zoom:1,dragging:false,lastX:0,lastY:0,lastDist:0};
    var pz=cv._pz;
    cv.addEventListener('mousedown',function(ev){pz.dragging=true;pz.lastX=ev.offsetX;pz.lastY=ev.offsetY;cv.style.cursor='grabbing';});
    cv.addEventListener('mousemove',function(ev){if(!pz.dragging)return;pz.panX+=ev.offsetX-pz.lastX;pz.panY+=ev.offsetY-pz.lastY;pz.lastX=ev.offsetX;pz.lastY=ev.offsetY;});
    cv.addEventListener('mouseup',function(){pz.dragging=false;cv.style.cursor='grab';});
    cv.addEventListener('mouseleave',function(){pz.dragging=false;cv.style.cursor='grab';});
    cv.addEventListener('wheel',function(ev){
      ev.preventDefault();
      var rect=cv.getBoundingClientRect();
      var mx=(ev.clientX-rect.left)*(CW2/rect.width);
      var my=(ev.clientY-rect.top)*(CH2/rect.height);
      var delta=ev.deltaY>0?0.82:1.22;
      pz.zoom=Math.max(0.2,Math.min(12,pz.zoom*delta));
      pz.panX=mx-(mx-pz.panX)*delta;
      pz.panY=my-(my-pz.panY)*delta;
    },{passive:false});
    cv.addEventListener('touchstart',function(ev){
      ev.preventDefault();
      if(ev.touches.length===1){pz.dragging=true;pz.lastX=ev.touches[0].clientX;pz.lastY=ev.touches[0].clientY;}
      else if(ev.touches.length===2){pz.dragging=false;var dx=ev.touches[0].clientX-ev.touches[1].clientX,dy=ev.touches[0].clientY-ev.touches[1].clientY;pz.lastDist=Math.sqrt(dx*dx+dy*dy);}
    },{passive:false});
    cv.addEventListener('touchmove',function(ev){
      ev.preventDefault();
      if(ev.touches.length===1&&pz.dragging){var r2=cv.getBoundingClientRect(),sc=CW2/r2.width;pz.panX+=(ev.touches[0].clientX-pz.lastX)*sc;pz.panY+=(ev.touches[0].clientY-pz.lastY)*sc;pz.lastX=ev.touches[0].clientX;pz.lastY=ev.touches[0].clientY;}
      else if(ev.touches.length===2){var dx2=ev.touches[0].clientX-ev.touches[1].clientX,dy2=ev.touches[0].clientY-ev.touches[1].clientY,dist=Math.sqrt(dx2*dx2+dy2*dy2);if(pz.lastDist>0){var ratio=dist/pz.lastDist;pz.zoom=Math.max(0.2,Math.min(12,pz.zoom*ratio));}pz.lastDist=dist;}
    },{passive:false});
    cv.addEventListener('touchend',function(){pz.dragging=false;pz.lastDist=0;});
    cv.style.cursor='grab';
  }
  var pz=cv._pz;

  var bcfg=e.cfg||{k:0.1,Ta:22,tMin:0,tMax:12};
  var Cvals=[80,60,40,20,-20,-40];
  var cols2=['#ff6622','#ffaa22','#ffdd44','#88ffaa','#44aaff','#8888ff'];

  // Base coords (before pan/zoom): origin at left-center, t axis horizontal
  var OX0=40, OY0=CH2/2;
  var scx0=(CW2-55)/bcfg.tMax;  // 1 time unit in px at zoom=1
  var scy0=6;                     // 1 temp unit in px at zoom=1

  var cx3=cv.getContext('2d');

  function renderEDOFrame(){
    var pz2=cv._pz; if(!pz2)return;
    var OX=OX0+pz2.panX, OY=OY0+pz2.panY;
    var scx=scx0*pz2.zoom, scy=scy0*pz2.zoom;

    cx3.fillStyle='#05051a'; cx3.fillRect(0,0,CW2,CH2);

    // Grid
    cx3.strokeStyle='#0e0e2a'; cx3.lineWidth=0.5;
    var gstep=scx; var gxS=((0-OX)%gstep+gstep)%gstep;
    for(var gx=gxS;gx<CW2;gx+=gstep){cx3.beginPath();cx3.moveTo(gx,0);cx3.lineTo(gx,CH2);cx3.stroke();}
    var gstepY=scy; var gyS=((0-OY)%gstepY+gstepY)%gstepY;
    for(var gy2=gyS;gy2<CH2;gy2+=gstepY){cx3.beginPath();cx3.moveTo(0,gy2);cx3.lineTo(CW2,gy2);cx3.stroke();}

    // Axes
    cx3.strokeStyle='#2a3a66'; cx3.lineWidth=1.2;
    if(OY>0&&OY<CH2){cx3.beginPath();cx3.moveTo(0,OY);cx3.lineTo(CW2,OY);cx3.stroke();}
    if(OX>0&&OX<CW2){cx3.beginPath();cx3.moveTo(OX,0);cx3.lineTo(OX,CH2);cx3.stroke();}

    // Tick labels
    cx3.fillStyle='#4a5590'; cx3.font='8px Courier New'; cx3.textAlign='center';
    var tInt=1; if(scx<15)tInt=2; if(scx<8)tInt=5;
    var tLo=Math.ceil((-OX)/scx), tHi=Math.floor((CW2-OX)/scx);
    for(var tt=tLo;tt<=tHi;tt+=tInt){
      if(tt<0)continue;
      var ptx=OX+tt*scx;
      if(ptx>15&&ptx<CW2-5){cx3.beginPath();cx3.moveTo(ptx,OY-2);cx3.lineTo(ptx,OY+2);cx3.stroke();if(scx>8)cx3.fillText(tt,ptx,OY+11);}
    }
    var yLo=Math.ceil((OY-CH2)/scy), yHi=Math.floor(OY/scy);
    cx3.textAlign='right';
    for(var yy=yLo;yy<=yHi;yy+=tInt){
      var pty=OY-yy*scy;
      if(pty>5&&pty<CH2-2){cx3.beginPath();cx3.moveTo(OX-2,pty);cx3.lineTo(OX+2,pty);cx3.stroke();if(scy>6)cx3.fillText(bcfg.Ta+yy,OX-4,pty+3);}
    }

    // Axis labels
    cx3.fillStyle='#4455aa'; cx3.font='bold 8px Courier New'; cx3.textAlign='center';
    cx3.fillText('t (min)',CW2-24,OY-3);
    cx3.textAlign='left'; cx3.fillText('T(°C)',OX+3,11);

    // Asymptote Ta
    var pyTa=OY; // Ta maps to 0 offset -> center
    cx3.strokeStyle='#44aaff55'; cx3.lineWidth=1; cx3.setLineDash([5,4]);
    cx3.beginPath();cx3.moveTo(0,pyTa);cx3.lineTo(CW2,pyTa);cx3.stroke();cx3.setLineDash([]);
    cx3.fillStyle='#44aaff88'; cx3.font='7px Courier New'; cx3.textAlign='left';
    if(pyTa>6&&pyTa<CH2-4)cx3.fillText('T_a='+bcfg.Ta+'°C',OX+4,pyTa-3);

    // Draw solution curves
    Cvals.forEach(function(C,i){
      cx3.strokeStyle=cols2[i]; cx3.lineWidth=1.8; cx3.beginPath();
      var started3=false;
      var tLo2=Math.max(0,(-OX)/scx), tHi2=bcfg.tMax*2;
      for(var px=Math.max(0,OX);px<CW2;px++){
        var tv=(px-OX)/scx;
        if(tv<0){started3=false;continue;}
        var Tv=evalEDOSolution(e.edoType||'newton',bcfg,tv,C);
        // Tv is absolute temperature; offset from Ta for canvas
        var dy2=(Tv-bcfg.Ta)*scy;
        var ppy=OY-dy2;
        if(ppy<-20||ppy>CH2+20){started3=false;continue;}
        if(!started3){cx3.moveTo(px,ppy);started3=true;}else cx3.lineTo(px,ppy);
      }
      cx3.stroke();
      // Label at leftmost visible point
      var tFirst=Math.max(0,(-OX)/scx);
      var TFirst=evalEDOSolution(e.edoType||'newton',bcfg,tFirst,C);
      var pyFirst=OY-(TFirst-bcfg.Ta)*scy;
      if(pyFirst>8&&pyFirst<CH2-4&&OX>10){
        cx3.fillStyle=cols2[i]; cx3.font='7px Courier New'; cx3.textAlign='left';
        cx3.fillText('T0='+(bcfg.Ta+C),OX+3,pyFirst-2);
      }
    });

    // Hint
    cx3.fillStyle='rgba(5,5,26,0.75)'; cx3.fillRect(0,CH2-14,CW2,14);
    cx3.fillStyle='#334466'; cx3.font='7px Courier New'; cx3.textAlign='center';
    cx3.fillText('Arrastra | Scroll/pinch para zoom',CW2/2,CH2-3);
  }

  // Animate loop
  var edoFamAnimId;
  function edoFamLoop(){
    renderEDOFrame();
    edoFamAnimId=requestAnimationFrame(edoFamLoop);
    if(!document.getElementById('edo-graph-'+e.id)){
      cancelAnimationFrame(edoFamAnimId);
    }
  }
  edoFamAnimId=requestAnimationFrame(edoFamLoop);
  if(!window._edoAnims)window._edoAnims=[];
  window._edoAnims.push(edoFamAnimId);
}

function drawEDOAppGraph(e){
  var cv=document.getElementById('edo-app-'+e.id);
  if(!cv)return;
  var cx2=cv.getContext('2d'); var CW=400,CH=160;
  var ed=e.edoDef;
  if(!ed||!ed.aplicacion)return;
  var ap=ed.aplicacion;
  var k=ap.k, Ta=ap.Ta, T0=ap.T0, tMax=ap.tMax||15;

  cx2.fillStyle='#050510';cx2.fillRect(0,0,CW,CH);
  var OX=45,OY=CH-30,scx=(CW-55)/tMax,scyA=(CH-40)/(T0-Ta+10);

  // axes
  cx2.strokeStyle='#2a3a66';cx2.lineWidth=1;
  cx2.beginPath();cx2.moveTo(OX,10);cx2.lineTo(OX,OY);cx2.stroke();
  cx2.beginPath();cx2.moveTo(OX,OY);cx2.lineTo(CW-5,OY);cx2.stroke();
  cx2.fillStyle='#556688';cx2.font='8px Courier New';cx2.textAlign='center';
  cx2.fillText('t (min)',CW-22,OY+12);
  cx2.textAlign='right';cx2.fillText('T (°C)',OX-2,14);

  // tick labels y
  cx2.textAlign='right';
  [Ta, Ta+20, Ta+40, T0].forEach(function(yv){
    var py2=OY-(yv-Ta)*scyA;
    if(py2>10&&py2<OY){
      cx2.fillText(yv,OX-3,py2+3);
      cx2.beginPath();cx2.moveTo(OX-3,py2);cx2.lineTo(OX,py2);cx2.stroke();
    }
  });

  // asintota Ta
  cx2.strokeStyle='#44aaff33';cx2.lineWidth=1;cx2.setLineDash([4,4]);
  cx2.beginPath();cx2.moveTo(OX,OY);cx2.lineTo(CW,OY);cx2.stroke();
  cx2.setLineDash([]);
  cx2.fillStyle='#44aaff88';cx2.font='7px Courier New';cx2.textAlign='left';
  cx2.fillText('T_a='+Ta+'°C',OX+3,OY-3);

  // animate: draw the curve progressively using requestAnimationFrame
  var frame=0, totalFrames=120;
  var animId;
  function anim(){
    var prog=Math.min(1,frame/totalFrames);
    cx2.fillStyle='#050510';cx2.fillRect(OX+1,0,CW,OY-1);

    // curve T(t) for t in [0, tMax*prog]
    cx2.strokeStyle='#ff8844';cx2.lineWidth=2.5;cx2.beginPath();
    var started2=false;
    for(var px=OX;px<OX+(CW-OX-5)*prog;px++){
      var tv=(px-OX)/scx;
      var Tv=Ta+(T0-Ta)*Math.exp(-k*tv);
      var py2=OY-(Tv-Ta)*scyA;
      if(py2<10||py2>OY){started2=false;continue;}
      if(!started2){cx2.moveTo(px,py2);started2=true;}else cx2.lineTo(px,py2);
    }
    cx2.stroke();

    // t=10 marker
    if(prog>0.7){
      var px10=OX+10*scx;
      var T10=Ta+(T0-Ta)*Math.exp(-k*10);
      var py10=OY-(T10-Ta)*scyA;
      cx2.strokeStyle='#ff4444';cx2.lineWidth=1.5;cx2.setLineDash([3,3]);
      cx2.beginPath();cx2.moveTo(px10,OY);cx2.lineTo(px10,py10);cx2.stroke();
      cx2.beginPath();cx2.moveTo(OX,py10);cx2.lineTo(px10,py10);cx2.stroke();
      cx2.setLineDash([]);
      cx2.fillStyle='#ff8888';cx2.font='bold 9px Courier New';cx2.textAlign='center';
      cx2.fillText('t=10',px10,OY+12);
      cx2.textAlign='right';
      cx2.fillText(T10.toFixed(1)+'°C',OX-2,py10+3);
      // dot
      cx2.beginPath();cx2.arc(px10,py10,4,0,Math.PI*2);
      cx2.fillStyle='#ff4444';cx2.fill();
    }

    // T0 label
    cx2.fillStyle='#ffaa44';cx2.font='8px Courier New';cx2.textAlign='left';
    cx2.fillText('T0='+T0+'°C',OX+3,OY-(T0-Ta)*scyA-3);

    frame++;
    if(frame<totalFrames+60) animId=requestAnimationFrame(anim);
  }
  animId=requestAnimationFrame(anim);
  // store to cancel when panel closes
  if(!window._edoAnims) window._edoAnims=[];
  window._edoAnims.push(animId);
}

// ── Kill EDO enemy (boss vs minion) ─────────────────────────────────────
function killEDOEnemy(e){
  e.dead=true; kills++; score+=e.isBoss?500*(level+1):50*(level+1);
  startDeathAnim(e, e.segments.map(function(s){return Object.assign({},s);}));
  player.hp=Math.min(player.maxHp, player.hp+(e.isBoss?30:8));
  player.bullets=Math.min(player.maxBullets, player.bullets+(e.isBoss?5:2));
  updateHUD();

  var ov=document.getElementById('overlay');
  var mathDiv=document.getElementById('ov-math');
  var btn=document.getElementById('ov-btn');

  if(!e.isBoss){
    // Minion: breve mensaje, continuar
    document.getElementById('ov-title').textContent='Curva eliminada: '+e.name;
    document.getElementById('ov-phase-banner').style.display='none';
    document.getElementById('ov-desc').textContent='Esta curva es una solucion particular. El jefe (Solucion General) sigue vivo!';
    mathDiv.style.display='block';
    mathDiv.innerHTML='<div style="background:#0a0a1a;border:1px solid #334466;border-radius:6px;padding:10px;font-family:Courier New,monospace;font-size:10px;color:#aac8ff;">'+
      '<div style="color:#ffcc44;font-weight:bold;margin-bottom:4px;">'+e.fx+'</div>'+
      '<div>Esta es una <strong>solucion particular</strong> de la EDO.</div>'+
      '<div>Condicion inicial implicita: C = '+e.C+'</div>'+
      '<div style="margin-top:6px;color:#88ff88;">La familia completa: T(t) = T_a + C·e^(-kt)  con C arbitrario.</div>'+
    '</div>';
    var alive=enemies.filter(function(en){return!en.dead;});
    btn.textContent='Continuar — '+alive.length+' restante'+(alive.length>1?'s':'');
    btn.onclick=function(){ov.style.display='none';gameState='playing';};
    gameState='info';
    ov.style.display='flex';
    return;
  }

  // BOSS killed: full EDO card
  document.getElementById('ov-title').textContent='JEFE VENCIDO: Solucion General';
  document.getElementById('ov-phase-banner').style.display='block';
  document.getElementById('ov-phase-banner').textContent='Has dominado la EDO de Newton!';
  document.getElementById('ov-desc').textContent='La solucion general fue vencida. Aqui esta todo lo que aprendiste:';
  mathDiv.style.display='block';
  mathDiv.innerHTML=buildEDOCard(e);
  renderEDOGraphs(e);

  var alive2=enemies.filter(function(en){return!en.dead;});
  if(alive2.length>0){
    btn.textContent='Continuar (quedan minions)';
    btn.onclick=function(){ov.style.display='none';gameState='playing';};
  } else {
    if(level<LEVELS.length-1){
      btn.textContent='Siguiente: '+LEVELS[level+1].name;
      btn.onclick=function(){level++;startLevel();};
    } else {
      btn.textContent='Juego COMPLETADO! Reiniciar';
      btn.onclick=function(){level=0;score=0;kills=0;LEVELS=generateAllLevels();showIntro();};
    }
  }
  gameState='info';
  ov.style.display='flex';
}

function generateAllLevels(){
  var levels=[];
  var fN=['Lineal','Cuadraticas','Cubica & Raiz','Trigonometricas','Racional & Exponencial','Trascendentales'];
  var iN=['Int. Lineal','Int. Cuadratica','Int. Trigonometricas','Int. Exponencial','Int. Logaritmo','Int. Mixta Final'];
  FUNC_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+1)+' - '+fN[i],phase:'func',enemies:buildLevel(tpl,'func')});
  });
  DERIV_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+7)+' - Derivada: '+fN[i],phase:'deriv',enemies:buildLevel(tpl,'deriv')});
  });
  INTEG_TPL.forEach(function(tpl,i){
    levels.push({name:'Nivel '+(i+13)+' - Integral: '+iN[i],phase:'integ',enemies:buildLevelInteg(tpl)});
  });
  // EDO level (Nivel 19)
  var edoLvl=buildEDOLevel(0);
  levels.push(edoLvl);
  return levels;
}

var LEVELS=generateAllLevels();
var level=0, gameState='intro';
var player, playerBullets, enemies, enemyBullets;
var score=0, kills=0;
var lastTime=0, playerMoveTimer=0;
var PLAYER_SPEED=115;

// DEATH ANIMATION
var deathAnims=[];
function startDeathAnim(e,segs){deathAnims.push({e:e,t:0,segs:segs});}
function updateDeathAnims(dt){
  deathAnims.forEach(function(da){da.t+=dt/1200;if(da.t>1)da.t=1;});
  deathAnims=deathAnims.filter(function(da){return da.t<1;});
}
function drawDeathAnims(){
  dCtx.clearRect(0,0,W,H);
  deathAnims.forEach(function(da){
    var e=da.e,t=da.t;
    if(t<0.4){
      var alpha=1-t/0.4;
      da.segs.forEach(function(s,i){
        var sc=(t/0.4)*3*(i%3===0?-1:1);
        var sx=s.x*CELL+CELL/2+sc*CELL,sy=s.y*CELL+CELL/2+sc*CELL*0.5;
        var r=(CELL/2)*(1-t/0.4)*0.8;
        dCtx.beginPath();dCtx.arc(sx,sy,Math.max(1,r),0,Math.PI*2);
        var hex=Math.round(alpha*255).toString(16).padStart(2,'0');
        dCtx.fillStyle=e.color+hex;dCtx.fill();
      });
    } else {
      var prog=(t-0.4)/0.6;
      var al=Math.min(1,prog*2);
      var ha=Math.round(al*220).toString(16).padStart(2,'0');
      dCtx.strokeStyle='#334466aa';dCtx.lineWidth=0.8;
      dCtx.beginPath();dCtx.moveTo(ORIG_X,0);dCtx.lineTo(ORIG_X,H);dCtx.stroke();
      dCtx.beginPath();dCtx.moveTo(0,ORIG_Y);dCtx.lineTo(W,ORIG_Y);dCtx.stroke();
      dCtx.strokeStyle=e.color+ha;dCtx.lineWidth=2.5;dCtx.setLineDash([]);dCtx.beginPath();
      var started=false;
      var maxX=Math.round(prog*(COLS-4));
      for(var cx=2;cx<=maxX;cx++){
        var raw=evalFunc(e.type,e.cfg,cx);
        if(raw===null||!isFinite(raw)||Math.abs(raw)>30){started=false;continue;}
        var cy=MID_Y-raw*1.5;
        var px=cx*CELL+CELL/2,py=cy*CELL+CELL/2;
        if(py<0||py>H){started=false;continue;}
        if(!started){dCtx.moveTo(px,py);started=true;}else dCtx.lineTo(px,py);
      }
      dCtx.stroke();
      if(prog>0.6){
        var la=Math.round(((prog-0.6)/0.4)*200).toString(16).padStart(2,'0');
        dCtx.font='bold 13px Courier New';dCtx.fillStyle=e.color+la;
        dCtx.textAlign='left';dCtx.fillText(e.fx,8,18);
      }
    }
  });
}

// PLAYER & ENEMIES
function initPlayer(){
  player={
    segments:[{x:MID_X,y:MID_Y+10},{x:MID_X-1,y:MID_Y+10},{x:MID_X-2,y:MID_Y+10}],
    dir:{x:1,y:0},nextDir:{x:1,y:0},
    hp:100+level*20,maxHp:100+level*20,
    dmg:25+level*18,
    maxBullets:6+level*2,bullets:6+level*2,
    reloadTime:Math.max(300,1200-level*70),reloadTimer:0,
    color:'#44ff88',grow:0
  };
}

function initEnemies(){
  enemies=LEVELS[level].enemies.map(function(cfg,i){
    var path=buildPath(cfg);
    var si=clamp(Math.floor(path.length*(0.3+i*0.25)),0,path.length-1);
    var bodyLen=9+level*2;
    var segs=[];
    for(var kk=0;kk<bodyLen;kk++) segs.push(Object.assign({},path[clamp(si-kk,0,path.length-1)]));
    var isInteg=level>=12;
    var sc=isInteg?Math.min(6,3+Math.floor((level-12)/2)):Math.min(4,1+Math.floor(level/3));
    var hpM=isInteg?1.6:1, dmM=isInteg?1.5:1, spM=isInteg?0.75:1;
    return Object.assign({},cfg,{
      segments:segs,
      hp:Math.round((cfg.hp+level*18)*hpM),maxHp:Math.round((cfg.hp+level*18)*hpM),
      dmg:Math.round((cfg.dmg+level*2)*dmM),speed:Math.round(cfg.speed*spM),
      path:path,pathIdx:si,pathDir:1,moveTimer:0,
      shootTimer:Math.random()*2000,
      shootInterval:Math.max(500,2200-level*120)+Math.random()*800,
      shootCount:sc,bullets:sc*(4+level)*(isInteg?2:1),dead:false,grow:0
    });
  });
}

function startLevel(){
  var ph=LEVELS[level].phase;
  if(ph==='func'){
    var tpl=FUNC_TPL[level];
    LEVELS[level].enemies=buildLevel(tpl,'func');
  } else if(ph==='deriv'){
    var tpl2=DERIV_TPL[level-6];
    LEVELS[level].enemies=buildLevel(tpl2,'deriv');
  } else if(ph==='integ'){
    var tpl3=INTEG_TPL[level-12];
    LEVELS[level].enemies=buildLevelInteg(tpl3);
  } else if(ph==='edo'){
    var edoLvl=buildEDOLevel(0);
    LEVELS[level].enemies=edoLvl.enemies;
  }
  initPlayer();initEnemies();
  playerBullets=[];enemyBullets=[];deathAnims=[];
  gameState='playing';
  if(!_deathCount[level]) _deathCount[level]=0; // keep existing count, only reset on surrender
  updateHUD();updateEnemyHUD();
  document.getElementById('overlay').style.display='none';
  Object.keys(_af).forEach(function(k){cancelAnimationFrame(_af[k]);delete _af[k];});
}

// HUD
function updateHUD(){
  document.getElementById('h-lvl').textContent=level+1;
  var ph=level<6?'Funciones':level<12?'Derivadas':level<18?'Integrales':'EDOs';
  document.getElementById('h-phase').textContent=ph;
  document.getElementById('h-hp').textContent=Math.max(0,Math.round(player.hp));
  document.getElementById('bar-hp').style.width=Math.max(0,(player.hp/player.maxHp)*100)+'%';
  document.getElementById('h-dmg').textContent=player.dmg;
  document.getElementById('h-bullets').textContent=player.bullets+'/'+player.maxBullets;
  var rpct=player.bullets>=player.maxBullets?100:Math.round((player.reloadTimer/player.reloadTime)*100);
  document.getElementById('bar-reload').style.width=rpct+'%';
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-kills').textContent=kills;
}

function updateEnemyHUD(){
  var alive=enemies?enemies.filter(function(e){return!e.dead;}):[]; 
  if(!alive.length){
    document.getElementById('enemy-name').textContent='- Sin enemigos -';
    document.getElementById('enemy-fx').textContent='';
    document.getElementById('enemy-hp-bar').style.width='0%';
    document.getElementById('enemy-hp-txt').textContent='';return;
  }
  var e=alive[0];
  document.getElementById('enemy-name').textContent=e.name;
  document.getElementById('enemy-fx').textContent=e.fx;
  document.getElementById('enemy-hp-bar').style.width=Math.max(0,(e.hp/e.maxHp)*100)+'%';
  document.getElementById('enemy-hp-txt').textContent=Math.round(e.hp)+'/'+e.maxHp;
}

// SHOOT
function shootPlayer(){
  if(player.bullets<=0)return;
  var h=player.segments[0];
  playerBullets.push({x:h.x*CELL+CELL/2,y:h.y*CELL+CELL/2,vx:player.dir.x*4.5,vy:player.dir.y*4.5,r:6,color:'#66ffaa',dmg:player.dmg,life:400});
  player.bullets--;
  if(player.reloadTimer<=0)player.reloadTimer=player.reloadTime;
  updateHUD();
}

function shootEnemyBurst(e){
  if(e.dead||e.bullets<=0)return;
  var h=e.segments[0],ph=player.segments[0];
  var baseAngle=Math.atan2(ph.y-h.y,ph.x-h.x);
  var count=e.shootCount||1;
  var spread=(count-1)*0.18;
  for(var i=0;i<count;i++){
    if(e.bullets<=0)break;
    var angle=count===1?baseAngle:baseAngle-spread/2+i*(spread/(count-1));
    var spd=3.0+level*0.15;
    enemyBullets.push({x:h.x*CELL+CELL/2,y:h.y*CELL+CELL/2,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:4+Math.min(2,Math.floor(level/3)),color:'#ff3355',dmg:e.dmg,life:480});
    e.bullets--;
  }
}

// UPDATE
function update(dt){
  if(gameState!=='playing')return;
  if(player.bullets<player.maxBullets){
    player.reloadTimer+=dt;
    if(player.reloadTimer>=player.reloadTime){player.reloadTimer=0;player.bullets++;updateHUD();}
  } else {player.reloadTimer=0;}
  updateHUD();
  playerMoveTimer+=dt;
  if(playerMoveTimer>=PLAYER_SPEED){
    playerMoveTimer=0;
    player.dir=Object.assign({},player.nextDir);
    var h=player.segments[0];
    var nx=((h.x+player.dir.x)%COLS+COLS)%COLS;
    var ny=((h.y+player.dir.y)%ROWS+ROWS)%ROWS;
    if(player.grow>0){player.grow--;player.segments.unshift({x:nx,y:ny});}
    else{player.segments.unshift({x:nx,y:ny});player.segments.pop();}
  }
  enemies.forEach(function(e){
    if(e.dead)return;
    e.moveTimer+=dt;
    if(e.moveTimer>=e.speed){
      e.moveTimer=0;
      e.pathIdx+=e.pathDir;
      if(e.pathIdx>=e.path.length-1){e.pathIdx=e.path.length-1;e.pathDir=-1;}
      else if(e.pathIdx<=0){e.pathIdx=0;e.pathDir=1;}
      var np=e.path[e.pathIdx];
      if(e.grow>0){e.grow--;e.segments.unshift(Object.assign({},np));}
      else{e.segments.unshift(Object.assign({},np));e.segments.pop();}
    }
    e.shootTimer+=dt;
    if(e.shootTimer>=e.shootInterval&&e.bullets>0){
      e.shootTimer=0;e.shootInterval=Math.max(500,2200-level*120)+Math.random()*800;
      shootEnemyBurst(e);
    }
  });
  playerBullets.forEach(function(b){b.x+=b.vx;b.y+=b.vy;b.life-=dt;});
  playerBullets=playerBullets.filter(function(b){return b.life>0&&b.x>0&&b.x<W&&b.y>0&&b.y<H;});
  enemyBullets.forEach(function(b){b.x+=b.vx;b.y+=b.vy;b.life-=dt;});
  enemyBullets=enemyBullets.filter(function(b){return b.life>0&&b.x>0&&b.x<W&&b.y>0&&b.y<H;});
  playerBullets.forEach(function(b){
    enemies.forEach(function(e){
      if(e.dead)return;
      e.segments.forEach(function(s){
        if(Math.abs(b.x-s.x*CELL-CELL/2)<CELL&&Math.abs(b.y-s.y*CELL-CELL/2)<CELL){
          e.hp-=b.dmg;b.life=-1;if(e.hp<=0)killEnemy(e);
        }
      });
    });
  });
  var ph=player.segments[0];
  var phx=ph.x*CELL+CELL/2,phy=ph.y*CELL+CELL/2;
  enemyBullets.forEach(function(b){
    if(Math.abs(b.x-phx)<CELL&&Math.abs(b.y-phy)<CELL){player.hp-=b.dmg;b.life=-1;updateHUD();if(player.hp<=0)gameOver();}
  });
  enemies.forEach(function(e){
    if(e.dead)return;
    e.segments.forEach(function(s){
      if(s.x===ph.x&&s.y===ph.y){player.hp-=e.dmg*0.4;updateHUD();if(player.hp<=0)gameOver();}
    });
  });
  updateDeathAnims(dt);
  if(enemies.every(function(e){return e.dead;})&&gameState==='playing')levelComplete();
  updateEnemyHUD();
}

// KILL ENEMY
function killEnemy(e){
  // Route EDO enemies to specialized handler
  if(e.isEDO){ killEDOEnemy(e); return; }
  e.dead=true;kills++;score+=100*(level+1);
  startDeathAnim(e,e.segments.map(function(s){return Object.assign({},s);}));
  player.hp=Math.min(player.maxHp,player.hp+15);
  player.bullets=Math.min(player.maxBullets,player.bullets+3);
  updateHUD();
  var ov=document.getElementById('overlay');
  document.getElementById('ov-title').textContent='Eliminaste: '+e.name;
  document.getElementById('ov-phase-banner').style.display='none';
  document.getElementById('ov-desc').textContent='Observa como la serpiente se convierte en su grafica real...';
  var mathDiv=document.getElementById('ov-math');
  mathDiv.style.display='block';
  mathDiv.innerHTML=buildMathCard(e);
  var alive=enemies.filter(function(en){return!en.dead;});
  var btn=document.getElementById('ov-btn');
  if(alive.length>0){
    btn.textContent='Continuar ('+alive.length+' restante'+(alive.length>1?'s':'')+')';
    btn.onclick=function(){ov.style.display='none';gameState='playing';};
  } else {
    if(level<LEVELS.length-1){
      var curr=level>=12?'integ':level>=6?'deriv':'func';
      var next=(level+1)>=12?'integ':(level+1)>=6?'deriv':'func';
      if(curr==='func'&&next==='deriv') btn.textContent='Enfrentar a Las Derivadas!';
      else if(curr==='deriv'&&next==='integ') btn.textContent='Enfrentar a Las Integrales!';
      else btn.textContent='Siguiente: '+LEVELS[level+1].name;
      btn.onclick=function(){level++;startLevel();};
    } else {
      btn.textContent='Juego completado! Reiniciar';
      btn.onclick=function(){level=0;score=0;kills=0;LEVELS=generateAllLevels();showIntro();};
    }
  }
  gameState='info';
  ov.style.display='flex';
  Object.keys(_af).forEach(function(k){cancelAnimationFrame(_af[k]);delete _af[k];});
  setTimeout(function(){drawMiniGraph(e);},80);
}

function levelComplete(){
  gameState='info';
  var ov=document.getElementById('overlay');
  document.getElementById('ov-math').style.display='none';document.getElementById('ov-math').innerHTML='';
  document.getElementById('ov-phase-banner').style.display='none';
  document.getElementById('ov-title').textContent='Nivel '+(level+1)+' completado!';
  document.getElementById('ov-desc').textContent='Score: '+score+' - Kills: '+kills;
  var btn=document.getElementById('ov-btn');
  if(level<LEVELS.length-1){
    var isPhase=level===5||level===11||level===17;
    if(isPhase){
      document.getElementById('ov-phase-banner').style.display='block';
      var bTxt=level===5?'Ahora enfrentaras a LAS DERIVADAS!':
               level===11?'FASE FINAL: LAS INTEGRALES! Maxima dificultad.':
               'BOSS FINAL: LAS EDOs! Ecuaciones Diferenciales te esperan.';
      document.getElementById('ov-phase-banner').textContent=bTxt;
      btn.textContent=level===5?'Acepto el reto! Nivel 7':
                      level===11?'Integrar o morir! Nivel 13':
                      'Enfrentar las EDOs! Nivel 19';
    } else {
      btn.textContent='Nivel '+(level+2)+': '+LEVELS[level+1].name;
    }
    btn.onclick=function(){level++;startLevel();};
  } else {
    btn.textContent='Completaste todo! Reiniciar';
    btn.onclick=function(){level=0;score=0;kills=0;LEVELS=generateAllLevels();showIntro();};
  }
  ov.style.display='flex';
}

var _deathCount = {}; // level -> number of deaths

function gameOver(){
  gameState='gameover';
  // Track deaths per level
  if(!_deathCount[level]) _deathCount[level]=0;
  _deathCount[level]++;

  var ov=document.getElementById('overlay');
  var mathDiv=document.getElementById('ov-math');
  var btn=document.getElementById('ov-btn');
  document.getElementById('ov-phase-banner').style.display='none';

  var isHard = level>=17; // Levels 18 and 19 (index 17,18)
  var diedBefore = _deathCount[level] > 1;

  document.getElementById('ov-title').textContent='GAME OVER';
  document.getElementById('ov-desc').textContent='Puntuacion: '+score;

  if(isHard && diedBefore){
    // Show surrender option alongside retry
    mathDiv.style.display='block';
    mathDiv.innerHTML=
      '<div style="background:#1a0808;border:1px solid #882222;border-radius:8px;padding:10px 14px;font-family:Courier New,monospace;">'+
      '<div style="font-size:11px;color:#ff8888;margin-bottom:8px;">Este nivel es muy dificil. Puedes rendirte para ver el contenido educativo.</div>'+
      '<button onclick="surrenderLevel()" style="width:100%;background:#2a0a0a;color:#ff6644;border:1px solid #882222;'+
      'border-radius:6px;padding:8px;font-family:Courier New,monospace;font-size:12px;cursor:pointer;margin-bottom:6px;">'+
      'Rendirse y ver el contenido del nivel</button>'+
      '<div style="font-size:9px;color:#664444;text-align:center;">Muertes en este nivel: '+_deathCount[level]+'</div>'+
      '</div>';
  } else {
    mathDiv.style.display='none';
    mathDiv.innerHTML='';
  }

  btn.textContent='Reintentar - Nivel '+(level+1);
  btn.onclick=function(){startLevel();};
  ov.style.display='flex';
}

function surrenderLevel(){
  // Show the victory content without having won — but mark it as "rendido"
  var ph=LEVELS[level].phase;
  var ov=document.getElementById('overlay');
  document.getElementById('ov-title').textContent='Contenido: Nivel '+(level+1);
  document.getElementById('ov-desc').textContent='Aqui esta lo que habrias aprendido al vencer este nivel.';
  document.getElementById('ov-phase-banner').style.display='block';
  document.getElementById('ov-phase-banner').textContent='Modo lectura — no se otorgan puntos';

  var mathDiv=document.getElementById('ov-math');
  mathDiv.style.display='block';

  if(ph==='edo'){
    // Show EDO boss card
    var enemies2=LEVELS[level].enemies;
    var boss=enemies2[enemies2.length-1];
    if(boss&&boss.isEDO&&boss.isBoss){
      mathDiv.innerHTML=buildEDOCard(boss);
      renderEDOGraphs(boss);
    } else {
      mathDiv.innerHTML='<div style="color:#aac8ff;padding:8px;">Contenido EDO no disponible.</div>';
    }
  } else {
    // For integ/deriv levels: show card of the first alive (or last) enemy
    var enemies3=LEVELS[level].enemies;
    var target=enemies3[enemies3.length-1];
    if(target){
      // Regenerate enemy with fresh id so cards don't clash
      target.id='surr_'+Math.random().toString(36).slice(2,6);
      mathDiv.innerHTML=buildMathCard(target);
      setTimeout(function(){drawMiniGraph(target);},80);
    }
  }

  var btn=document.getElementById('ov-btn');
  if(level<LEVELS.length-1){
    btn.textContent='Ir al siguiente nivel';
    btn.onclick=function(){level++;_deathCount[level]=0;startLevel();};
  } else {
    btn.textContent='Volver al menu';
    btn.onclick=function(){showIntro();};
  }
  // Add retry option too
  var mathDiv2=document.getElementById('ov-math');
  var retryDiv=document.createElement('div');
  retryDiv.style.cssText='margin-top:10px;text-align:center;';
  retryDiv.innerHTML='<button onclick="startLevel()" style="background:#0e1a3a;color:#88aaff;border:1px solid #2a4488;'+
    'border-radius:6px;padding:5px 16px;font-family:Courier New,monospace;font-size:10px;cursor:pointer;">'+
    'Reintentar este nivel</button>';
  mathDiv2.appendChild(retryDiv);
}

function togglePause(){
  if(gameState==='playing'){
    gameState='paused';
    document.getElementById('pause-overlay').style.display='flex';
    document.getElementById('btn-pause').textContent='Continuar (P)';
  } else if(gameState==='paused'){
    gameState='playing';
    document.getElementById('pause-overlay').style.display='none';
    document.getElementById('btn-pause').textContent='Pausar (P)';
    lastTime=0;
  }
}

function confirmRestart(){
  if(gameState==='paused')document.getElementById('pause-overlay').style.display='none';
  document.getElementById('btn-pause').textContent='Pausar (P)';startLevel();
}

function goToMenu(){
  if(gameState==='paused')document.getElementById('pause-overlay').style.display='none';
  document.getElementById('btn-pause').textContent='Pausar (P)';
  score=0;kills=0;level=0;LEVELS=generateAllLevels();showIntro();
}

  html+='<div style="background:#070714;border:1px solid '+b.color+'22;border-radius:0 0 5px 5px;'+
        'padding:8px 10px;font-size:10px;line-height:1.7;font-family:Courier New,monospace;">';

  html+='<div style="background:#0a0a20;border-left:3px solid '+b.color+';padding:5px 9px;'+

function buildIntroMenu(){
  var sections=[
    {label:'Funciones',    icon:'f(x)', color:'#44aaff', levels:[1,2,3,4,5,6],   start:0},
    {label:'Derivadas',    icon:"f'(x)",color:'#aa44ff', levels:[7,8,9,10,11,12], start:6},
    {label:'Integrales',   icon:'F(x)', color:'#44ffbb', levels:[13,14,15,16,17,18],start:12},
    {label:'EDOs',         icon:"y'=f", color:'#ff44ff', levels:[19],              start:18}
  ];
  var html='<div style="width:100%;max-width:440px;">';

  // ── SECTION SELECTOR ───────────────────────────────────────────────────
  html+='<div style="background:#0a0a1e;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;margin-bottom:10px;">';
  html+='<div style="font-size:11px;color:#88aaff;font-weight:bold;margin-bottom:8px;letter-spacing:1px;">ELEGIR SECCION DE INICIO</div>';

  sections.forEach(function(sec){
    html+='<div style="margin-bottom:8px;">';
    html+='<div style="font-size:10px;color:'+sec.color+';font-weight:bold;margin-bottom:4px;">'+sec.icon+' — '+sec.label+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;">';
    sec.levels.forEach(function(lvl, i){
      var li=sec.start+i;
      var nm=['Lineal','Cuadraticas','Cubica & Raiz','Trigonometricas','Racional & Exp.','Trascendentales'];
      var ni=['Int. Lineal','Int. Cuadratica','Int. Trigon.','Int. Exponencial','Int. Logaritmo','Int. Mixta'];
      var derN=['D/Lineal','D/Cuadraticas','D/Cubica & Raiz','D/Trigonometricas','D/Racional & Exp.','D/Trascendentes'];
      var edoN=['Newton Cooling'];
      var labels=sec.start<6?nm:sec.start<12?derN:sec.start<18?ni:edoN;
      html+='<button class="lvl-select-btn" data-li="'+li+'" style="'+
        'background:#0e0e28;color:'+sec.color+';border:1px solid '+sec.color+'44;'+
        'border-radius:4px;font-family:Courier New,monospace;font-size:9px;'+
        'padding:3px 7px;cursor:pointer;transition:all 0.15s;" '+
        'title="'+labels[i]+'">'+'N'+lvl+'</button>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // ── BOOK RECOMMENDATIONS ───────────────────────────────────────────────
  html+='<div style="background:#0a0a1e;border:1px solid #2a2a44;border-radius:8px;padding:10px 12px;">';
  html+='<div style="font-size:11px;color:#ffcc44;font-weight:bold;margin-bottom:8px;letter-spacing:1px;">LIBROS RECOMENDADOS</div>';

  BOOKS.forEach(function(b){ html+=renderBookCard(b); });
  html+='</div>';

  html+='</div>';
  return html;
}

function wireIntroButtons(){
  document.querySelectorAll('.lvl-select-btn').forEach(function(btn){
    btn.addEventListener('mouseenter',function(){
      this.style.background=this.style.borderColor.replace('44','22');
      this.style.transform='scale(1.1)';
    });
    btn.addEventListener('mouseleave',function(){
      if(!this.classList.contains('selected')){
        this.style.background='#0e0e28';
        this.style.transform='scale(1)';
      }
    });
    btn.addEventListener('click',function(){
      // Deselect all
      document.querySelectorAll('.lvl-select-btn').forEach(function(b){
        b.style.background='#0e0e28';b.style.transform='scale(1)';
        b.classList.remove('selected');
      });
      // Select this one
      this.style.background='#1a2a44';
      this.style.transform='scale(1.12)';
      this.classList.add('selected');
      var li=parseInt(this.getAttribute('data-li'));
      var mainBtn=document.getElementById('ov-btn');
      mainBtn.textContent='Comenzar desde Nivel '+(li+1);
      mainBtn.onclick=function(){
        level=li; score=0; kills=0;
        LEVELS=generateAllLevels();
        startLevel();
      };
    });
  });
}

// DRAW
function drawGrid(){
  for(var x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,H);ctx.stroke();}
  for(var y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(W,y*CELL);ctx.stroke();}
  ctx.strokeStyle='#2a2a55';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(ORIG_X,0);ctx.lineTo(ORIG_X,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ORIG_Y);ctx.lineTo(W,ORIG_Y);ctx.stroke();
  ctx.fillStyle='#3a4488';ctx.font='9px Courier New';ctx.textAlign='center';
  for(var i=-MID_X;i<=MID_X;i+=5){if(i===0)continue;var px=ORIG_X+i*CELL;if(px>10&&px<W-10)ctx.fillText(i,px,ORIG_Y+12);}
  ctx.textAlign='right';
  for(var j=-MID_Y;j<=MID_Y;j+=4){if(j===0)continue;var py2=ORIG_Y+j*CELL;if(py2>10&&py2<H-10)ctx.fillText(-j,ORIG_X-3,py2+3);}
  ctx.fillStyle='#6677bb';ctx.textAlign='center';ctx.font='bold 11px Courier New';
  ctx.fillText('x',W-7,ORIG_Y+13);ctx.textAlign='left';ctx.fillText('y',ORIG_X+4,11);
  ctx.fillStyle='#445577';ctx.fillText('0',ORIG_X+3,ORIG_Y+12);
}

function drawSnake(segs,color,isPlayer){
  if(!segs||!segs.length)return;
  segs.forEach(function(s,i){
    var t2=i/segs.length;
    if(isPlayer){
      var alpha=Math.round((0.95-t2*0.5)*255).toString(16).padStart(2,'0');
      ctx.fillStyle=color+alpha;
    } else {
      ctx.fillStyle=i===0?color:color+Math.round((0.85-t2*0.55)*255).toString(16).padStart(2,'0');
    }
    ctx.fillRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2);
    if(i===0){
      ctx.fillStyle='#ffffff';
      if(isPlayer){
        var ex=player.dir.x>0?10:(player.dir.x<0?2:3);
        var ey=player.dir.y>0?10:(player.dir.y<0?2:3);
        if(player.dir.x!==0){ctx.fillRect(s.x*CELL+ex,s.y*CELL+3,3,3);ctx.fillRect(s.x*CELL+ex,s.y*CELL+10,3,3);}
        else{ctx.fillRect(s.x*CELL+3,s.y*CELL+ey,3,3);ctx.fillRect(s.x*CELL+10,s.y*CELL+ey,3,3);}
      } else {
        ctx.fillRect(s.x*CELL+3,s.y*CELL+3,3,3);ctx.fillRect(s.x*CELL+10,s.y*CELL+3,3,3);
      }
    }
  });
}

function drawFuncPath(e){
  if(!e.path||e.path.length<2)return;
  ctx.strokeStyle=e.color+'33';ctx.lineWidth=1;ctx.setLineDash([3,6]);
  ctx.beginPath();ctx.moveTo(e.path[0].x*CELL+CELL/2,e.path[0].y*CELL+CELL/2);
  for(var i=1;i<e.path.length;i++)ctx.lineTo(e.path[i].x*CELL+CELL/2,e.path[i].y*CELL+CELL/2);
  ctx.stroke();ctx.setLineDash([]);
}

function drawBullet(b){
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=b.color;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.stroke();
}

function draw(){
  ctx.fillStyle='#060612';ctx.fillRect(0,0,W,H);
  drawGrid();
  if(gameState==='playing'||gameState==='info'){
    enemies&&enemies.forEach(function(e){
      if(!e.dead){
        drawFuncPath(e);
        if(e.isBoss) drawEDOBoss(e);
        else drawSnake(e.segments,e.color,false);
        var h=e.segments[0];
        ctx.fillStyle=e.color;ctx.font='bold 8px Courier New';ctx.textAlign='center';
        ctx.fillText(e.name,h.x*CELL+CELL/2,h.y*CELL-3);
      }
    });
    player&&drawSnake(player.segments,player.color,true);
    playerBullets&&playerBullets.forEach(drawBullet);
    enemyBullets&&enemyBullets.forEach(drawBullet);
  }
  drawDeathAnims();
}

// INPUT
document.addEventListener('keydown',function(ev){
  if(gameState!=='playing')return;
  var k=ev.key;
  if(k==='ArrowLeft'||k==='a'||k==='A'){if(player.dir.x!==1)player.nextDir={x:-1,y:0};}
  else if(k==='ArrowRight'||k==='d'||k==='D'){if(player.dir.x!==-1)player.nextDir={x:1,y:0};}
  else if(k==='ArrowUp'||k==='w'||k==='W'){if(player.dir.y!==1)player.nextDir={x:0,y:-1};}
  else if(k==='ArrowDown'||k==='s'||k==='S'){if(player.dir.y!==-1)player.nextDir={x:0,y:1};}
  else if(k===' '){ev.preventDefault();shootPlayer();}
  else if(k==='p'||k==='P')togglePause();
});

// LOOP
function loop(ts){
  if(!lastTime)lastTime=ts;
  var dt=Math.min(ts-lastTime,80);lastTime=ts;
  update(dt);draw();requestAnimationFrame(loop);
}

showIntro();
requestAnimationFrame(loop);

  function cmHeader(){
    return '<div class="cm-overlay-header">'
      +'<div class="cm-header-top">'
      +'<img class="cm-logo" src="'+LOGO+'" alt="CM">'
      +'<div>'
      +'<div class="cm-title">COMPLEMENTO <span>MATEMÁTICO</span></div>'
      +'<div class="cm-subtitle">Prof. Bastiani Calabrano Inostroza</div>'

      +'</div>';
  }

  function inject(){
    var ov=document.getElementById('overlay');
    if(!ov)return;
    var old=ov.querySelector('.cm-overlay-header');
    if(old)old.remove();
    var w=document.createElement('div');
    w.innerHTML=cmHeader();
    ov.insertBefore(w.firstChild,ov.firstChild);
  }

  function watch(){
    var ov=document.getElementById('overlay');
    if(!ov){setTimeout(watch,200);return;}
    new MutationObserver(function(muts){
      muts.forEach(function(m){
        if(m.attributeName==='style'&&ov.style.display==='flex')inject();
      });
    }).observe(ov,{attributes:true});
    if(ov.style.display==='flex')inject();
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){watch();});
  } else { watch(); }
})();
